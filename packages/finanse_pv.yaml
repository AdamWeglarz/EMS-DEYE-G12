# ── Template sensors (live, bez var) ──────────────────────────────────────────

template:
  - sensor:
      - name: "Finanse: oszczędność vs G12 dziś"
        unique_id: "finanse_oszczednosc_vs_g12_dzis"
        unit_of_measurement: "PLN"
        icon: mdi:piggy-bank-outline
        state: >
          {% set import_k = states('var.finanse_import_koszt_dzis_pln') | float(0) %}
          {% set eksport_p = states('var.finanse_eksport_przychod_dzis_pln') | float(0) %}
          {% set kontrafakt = states('var.finanse_kontrafakt_g12_dzis_pln') | float(0) %}
          {{ (kontrafakt - (import_k - eksport_p)) | round(2) }}

      - name: "Finanse: oszczędność vs G11 dziś"
        unique_id: "finanse_oszczednosc_vs_g11_dzis"
        unit_of_measurement: "PLN"
        icon: mdi:piggy-bank
        state: >
          {% set import_k = states('var.finanse_import_koszt_dzis_pln') | float(0) %}
          {% set eksport_p = states('var.finanse_eksport_przychod_dzis_pln') | float(0) %}
          {% set kontrafakt = states('var.finanse_kontrafakt_g11_dzis_pln') | float(0) %}
          {{ (kontrafakt - (import_k - eksport_p)) | round(2) }}

      - name: "Finanse: oszczędność całkowita vs G12"
        unique_id: "finanse_oszczednosc_calkowita_g12"
        unit_of_measurement: "PLN"
        icon: mdi:piggy-bank
        state: >
          {% set skum = states('var.finanse_oszczednosc_skumulowana_g12_pln') | float(0) %}
          {% set offset = states('var.finanse_oszczednosc_offset_g12_pln') | float(0) %}
          {% set dzis = states('sensor.finanse_oszczednosc_vs_g12_dzis') | float(0) %}
          {{ (skum + offset + dzis) | round(2) }}

      - name: "Finanse: oszczędność całkowita vs G11"
        unique_id: "finanse_oszczednosc_calkowita_g11"
        unit_of_measurement: "PLN"
        icon: mdi:piggy-bank
        state: >
          {% set skum = states('var.finanse_oszczednosc_skumulowana_g11_pln') | float(0) %}
          {% set offset = states('var.finanse_oszczednosc_offset_g11_pln') | float(0) %}
          {% set dzis = states('sensor.finanse_oszczednosc_vs_g11_dzis') | float(0) %}
          {{ (skum + offset + dzis) | round(2) }}

      - name: "Finanse: koszt netto dziś"
        unique_id: "finanse_koszt_netto_dzis"
        unit_of_measurement: "PLN"
        icon: mdi:cash
        state: >
          {% set import_k = states('var.finanse_import_koszt_dzis_pln') | float(0) %}
          {% set eksport_p = states('var.finanse_eksport_przychod_dzis_pln') | float(0) %}
          {{ (import_k - eksport_p) | round(2) }}

      - name: "Finanse: zysk ze sprzedaży dziś"
        unique_id: "finanse_zysk_sprzedazy_dzis"
        unit_of_measurement: "PLN"
        icon: mdi:cash-plus
        state: >
          {% set eksport_p = states('var.finanse_eksport_przychod_dzis_pln') | float(0) %}
          {% set koszt_ladowania = states('var.finanse_koszt_ladowania_pod_sprzedaz_dzis_pln') | float(0) %}
          {{ (eksport_p - koszt_ladowania) | round(2) }}

      - name: "Finanse: zysk ze sprzedaży całkowity"
        unique_id: "finanse_zysk_sprzedazy_calkowity"
        unit_of_measurement: "PLN"
        icon: mdi:cash-multiple
        state: >
          {% set skum = states('var.finanse_zysk_sprzedazy_skumulowany_pln') | float(0) %}
          {% set offset = states('var.finanse_zysk_sprzedazy_offset_pln') | float(0) %}
          {% set dzis = states('sensor.finanse_zysk_sprzedazy_dzis') | float(0) %}
          {{ (skum + offset + dzis) | round(2) }}

      - name: "Cykl 6-6: strata małego magazynu dziś"
        unique_id: "finanse_cykl_strata_laczna_dzis"
        unit_of_measurement: "PLN"
        icon: mdi:battery-alert-variant-outline
        state: >
          {% set s_tanio = states('var.finanse_cykl_eksport_tanio_strata_pln') | float(0) %}
          {% set s_noc = states('var.finanse_cykl_import_noc_pln') | float(0) %}
          {{ (s_tanio + s_noc) | round(2) }}

      - name: "Cykl 6-6: strata małego magazynu skumulowana"
        unique_id: "finanse_cykl_strata_skum"
        unit_of_measurement: "PLN"
        icon: mdi:sigma
        state: >
          {% set skum = states('var.finanse_cykl_skum_strata_laczna_pln') | float(0) %}
          {% set dzis = states('sensor.cykl_6_6_strata_malego_magazynu_dzis') | float(0) %}
          {{ (skum + dzis) | round(2) }}

# ── Automatyzacje ──────────────────────────────────────────────────────────────

automation:

  # Akumulacja kosztów co 15 min
  - id: finanse_pv_akumulacja_15min
    alias: "Finanse PV: akumulacja kosztów co 15 min"
    description: >
      Co 15 min liczy deltę bought/sold/cons od poprzedniego triggera,
      wyszukuje cenę RCE dla obliczanego slotu (nie bieżącego triggera)
      i akumuluje koszty/przychody do dziennych varów.
    trigger:
      - platform: time_pattern
        minutes: "/15"
    action:
      - variables:
          bought_now: "{{ states('sensor.solarman_total_energy_bought_safe') | float(0) }}"
          sold_now: "{{ states('sensor.solarman_total_energy_sold_safe') | float(0) }}"
          cons_now: "{{ states('sensor.solarman_total_load_consumption_safe') | float(0) }}"
          prev_bought: "{{ states('var.finanse_prev_bought_kwh') | float(0) }}"
          prev_sold: "{{ states('var.finanse_prev_sold_kwh') | float(0) }}"
          prev_cons: "{{ states('var.finanse_prev_cons_kwh') | float(0) }}"
          prev_time_str: "{{ states('var.finanse_prev_trigger_time') }}"

      - variables:
          # Delta — zabezpieczenie przed: spike >3 kWh/15min (>12 kW), reset licznika (delta<0), inicjalizacja (prev=0)
          delta_bought: >
            {% set d = bought_now - prev_bought %}
            {{ d if (prev_bought > 0 and d >= 0 and d < 3) else 0 }}
          delta_sold: >
            {% set d = sold_now - prev_sold %}
            {{ d if (prev_sold > 0 and d >= 0 and d < 3) else 0 }}
          delta_cons: >
            {% set d = cons_now - prev_cons %}
            {{ d if (prev_cons > 0 and d >= 0 and d < 5) else 0 }}

          # Cena RCE dla slotu który właśnie minął: dtime = koniec slotu = prev_ts + 15min
          cena_sprzedazy_kwh: >
            {% set ceny = state_attr('sensor.rce_prices_today_scaled', 'value') or [] %}
            {% if prev_time_str == '2000-01-01 00:00:00' or ceny | length == 0 %}
              0
            {% else %}
              {% set prev_ts = as_local(as_datetime(prev_time_str)) %}
              {% set slot_end = prev_ts + timedelta(minutes=15) %}
              {% set rce = namespace(v=0, found=false) %}
              {% for c in ceny %}
                {% set dt = as_local(as_datetime(c.dtime)) %}
                {% if dt.hour == slot_end.hour and dt.minute == slot_end.minute and not rce.found %}
                  {% set rce.v = c.rce_pln | float(0) / 1000 %}
                  {% set rce.found = true %}
                {% endif %}
              {% endfor %}
              {{ rce.v }}
            {% endif %}

          # Cena G12 dla obliczanego slotu (prev_time = start slotu)
          cena_g12_kwh: >
            {% set prev_ts = as_local(as_datetime(prev_time_str)) %}
            {% set h = prev_ts.hour %}
            {% if (h >= 13 and h < 15) or h >= 22 or h < 6 %}
              {{ states('var.magazyn_koszt_calkowity_strefa_tansza_pln_kwh') | float(0.65) }}
            {% else %}
              {{ states('var.magazyn_koszt_calkowity_strefa_drozsza_pln_kwh') | float(1.03) }}
            {% endif %}

          cena_g12_tansza_kwh: "{{ states('var.magazyn_koszt_calkowity_strefa_tansza_pln_kwh') | float(0.65) }}"

          cena_g11_kwh: "{{ states('var.g11_cena_kwh') | float(0.96) }}"

          # Kwoty dla tego slotu
          slot_import_koszt: "{{ delta_bought | float(0) * cena_g12_kwh | float(0) }}"
          slot_eksport_przychod: "{{ delta_sold | float(0) * cena_sprzedazy_kwh | float(0) }}"
          slot_kontrafakt_g12: "{{ delta_cons | float(0) * cena_g12_kwh | float(0) }}"
          slot_kontrafakt_g11: "{{ delta_cons | float(0) * cena_g11_kwh | float(0) }}"
          # Koszt ładowania z grid pod sprzedaż (tylko gdy tryb = ładowanie z sieci)
          slot_koszt_ladowania_pod_sprzedaz: >
            {% set tryb = states('sensor.solarman_mode_status') %}
            {% if tryb in ['Ładuje z Grid', 'Start ładowania z Grid (konfiguracja w toku)'] %}
              {{ delta_bought | float(0) * cena_g12_kwh | float(0) }}
            {% else %}
              0
            {% endif %}

          # Cykl 6-6: eksport za tanio (06-22, RCE < G12_tańsza)
          slot_cykl_eksport_tanio_kwh: >
            {% set h = as_local(as_datetime(prev_time_str)).hour %}
            {% if h >= 6 and h < 22
                and delta_sold | float(0) > 0
                and cena_sprzedazy_kwh | float(0) > 0
                and cena_sprzedazy_kwh | float(0) < cena_g12_tansza_kwh | float(0.65) %}
              {{ delta_sold | float(0) }}
            {% else %}
              0
            {% endif %}
          slot_cykl_eksport_tanio_strata_pln: >
            {{ [slot_cykl_eksport_tanio_kwh | float(0) * (cena_g12_tansza_kwh | float(0.65) - cena_sprzedazy_kwh | float(0)), 0] | max | round(4) }}

          # Cykl 6-6: import nocny (22-06)
          slot_cykl_import_noc_kwh: >
            {% set h = as_local(as_datetime(prev_time_str)).hour %}
            {% if h >= 22 or h < 6 %}
              {{ delta_bought | float(0) }}
            {% else %}
              0
            {% endif %}
          slot_cykl_import_noc_pln: >
            {{ (slot_cykl_import_noc_kwh | float(0) * cena_g12_tansza_kwh | float(0.65)) | round(4) }}

          # Cykl 6-6: dobry eksport (06-22, RCE >= G12_tańsza + marża)
          slot_cykl_eksport_dobry_kwh: >
            {% set h = as_local(as_datetime(prev_time_str)).hour %}
            {% set marza = states('var.magazyn_min_zysk_sprzedaz_pln_kwh') | float(0.38) %}
            {% if h >= 6 and h < 22
                and delta_sold | float(0) > 0
                and cena_sprzedazy_kwh | float(0) >= cena_g12_tansza_kwh | float(0.65) + marza %}
              {{ delta_sold | float(0) }}
            {% else %}
              0
            {% endif %}
          slot_cykl_eksport_dobry_pln: >
            {{ (slot_cykl_eksport_dobry_kwh | float(0) * cena_sprzedazy_kwh | float(0)) | round(4) }}

      # Akumuluj do dziennych varów
      - service: var.set
        data:
          entity_id: var.finanse_import_koszt_dzis_pln
          value: >
            {{ (states('var.finanse_import_koszt_dzis_pln') | float(0) + slot_import_koszt) | round(4) }}

      - service: var.set
        data:
          entity_id: var.finanse_eksport_przychod_dzis_pln
          value: >
            {{ (states('var.finanse_eksport_przychod_dzis_pln') | float(0) + slot_eksport_przychod) | round(4) }}

      - service: var.set
        data:
          entity_id: var.finanse_kontrafakt_g12_dzis_pln
          value: >
            {{ (states('var.finanse_kontrafakt_g12_dzis_pln') | float(0) + slot_kontrafakt_g12) | round(4) }}

      - service: var.set
        data:
          entity_id: var.finanse_kontrafakt_g11_dzis_pln
          value: >
            {{ (states('var.finanse_kontrafakt_g11_dzis_pln') | float(0) + slot_kontrafakt_g11) | round(4) }}

      - service: var.set
        data:
          entity_id: var.finanse_koszt_ladowania_pod_sprzedaz_dzis_pln
          value: >
            {{ (states('var.finanse_koszt_ladowania_pod_sprzedaz_dzis_pln') | float(0) + slot_koszt_ladowania_pod_sprzedaz) | round(4) }}

      # Akumuluj straty cyklu 6-6
      - service: var.set
        data:
          entity_id: var.finanse_cykl_eksport_tanio_kwh
          value: >
            {{ (states('var.finanse_cykl_eksport_tanio_kwh') | float(0) + slot_cykl_eksport_tanio_kwh | float(0)) | round(4) }}
      - service: var.set
        data:
          entity_id: var.finanse_cykl_eksport_tanio_strata_pln
          value: >
            {{ (states('var.finanse_cykl_eksport_tanio_strata_pln') | float(0) + slot_cykl_eksport_tanio_strata_pln | float(0)) | round(4) }}
      - service: var.set
        data:
          entity_id: var.finanse_cykl_import_noc_kwh
          value: >
            {{ (states('var.finanse_cykl_import_noc_kwh') | float(0) + slot_cykl_import_noc_kwh | float(0)) | round(4) }}
      - service: var.set
        data:
          entity_id: var.finanse_cykl_import_noc_pln
          value: >
            {{ (states('var.finanse_cykl_import_noc_pln') | float(0) + slot_cykl_import_noc_pln | float(0)) | round(4) }}
      - service: var.set
        data:
          entity_id: var.finanse_cykl_eksport_dobry_kwh
          value: >
            {{ (states('var.finanse_cykl_eksport_dobry_kwh') | float(0) + slot_cykl_eksport_dobry_kwh | float(0)) | round(4) }}
      - service: var.set
        data:
          entity_id: var.finanse_cykl_eksport_dobry_pln
          value: >
            {{ (states('var.finanse_cykl_eksport_dobry_pln') | float(0) + slot_cykl_eksport_dobry_pln | float(0)) | round(4) }}

      # Zapisz poprzednie wartości liczników i czas triggera
      - service: var.set
        data:
          entity_id: var.finanse_prev_bought_kwh
          value: "{{ bought_now }}"
      - service: var.set
        data:
          entity_id: var.finanse_prev_sold_kwh
          value: "{{ sold_now }}"
      - service: var.set
        data:
          entity_id: var.finanse_prev_cons_kwh
          value: "{{ cons_now }}"
      - service: var.set
        data:
          entity_id: var.finanse_prev_trigger_time
          value: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"

  # Reset o 23:59 — zapisz wczorajsze dane i wyzeruj akumulatory
  - id: finanse_pv_reset_dzienny
    alias: "Finanse PV: reset dzienny 23:59"
    trigger:
      - platform: time
        at: "23:59:00"
    action:
      - variables:
          import_k: "{{ states('var.finanse_import_koszt_dzis_pln') | float(0) }}"
          eksport_p: "{{ states('var.finanse_eksport_przychod_dzis_pln') | float(0) }}"
          kontrafakt_g12: "{{ states('var.finanse_kontrafakt_g12_dzis_pln') | float(0) }}"
          kontrafakt_g11: "{{ states('var.finanse_kontrafakt_g11_dzis_pln') | float(0) }}"
          koszt_netto: "{{ import_k - eksport_p }}"
          koszt_ladowania_pod_sprzedaz: "{{ states('var.finanse_koszt_ladowania_pod_sprzedaz_dzis_pln') | float(0) }}"
          zysk_sprzedazy: "{{ eksport_p - koszt_ladowania_pod_sprzedaz }}"

      # Zapisz wczorajsze dane
      - service: var.set
        data:
          entity_id: var.finanse_import_koszt_wczoraj_pln
          value: "{{ import_k | round(4) }}"
      - service: var.set
        data:
          entity_id: var.finanse_eksport_przychod_wczoraj_pln
          value: "{{ eksport_p | round(4) }}"
      - service: var.set
        data:
          entity_id: var.finanse_oszczednosc_vs_g12_wczoraj_pln
          value: "{{ (kontrafakt_g12 - koszt_netto) | round(4) }}"
      - service: var.set
        data:
          entity_id: var.finanse_oszczednosc_vs_g11_wczoraj_pln
          value: "{{ (kontrafakt_g11 - koszt_netto) | round(4) }}"

      # Dodaj do akumulatorów skumulowanych
      - service: var.set
        data:
          entity_id: var.finanse_oszczednosc_skumulowana_g12_pln
          value: >
            {{ (states('var.finanse_oszczednosc_skumulowana_g12_pln') | float(0)
                + (kontrafakt_g12 - koszt_netto)) | round(4) }}
      - service: var.set
        data:
          entity_id: var.finanse_oszczednosc_skumulowana_g11_pln
          value: >
            {{ (states('var.finanse_oszczednosc_skumulowana_g11_pln') | float(0)
                + (kontrafakt_g11 - koszt_netto)) | round(4) }}
      - service: var.set
        data:
          entity_id: var.finanse_zysk_sprzedazy_skumulowany_pln
          value: >
            {{ (states('var.finanse_zysk_sprzedazy_skumulowany_pln') | float(0)
                + zysk_sprzedazy) | round(4) }}

      # Wyślij podsumowanie
      - service: script.ems_notify
        data:
          title: "💰 Finanse PV – podsumowanie dnia {{ now().strftime('%d.%m.%Y') }}"
          message: >
            Import z sieci: {{ import_k | round(2) }} PLN
            Przychód eksportu: {{ eksport_p | round(2) }} PLN
            Koszt netto: {{ koszt_netto | round(2) }} PLN

            Kontrafakt G12: {{ kontrafakt_g12 | round(2) }} PLN
            Kontrafakt G11: {{ kontrafakt_g11 | round(2) }} PLN

            💚 Oszczędność vs G12: {{ (kontrafakt_g12 - koszt_netto) | round(2) }} PLN
            💚 Oszczędność vs G11: {{ (kontrafakt_g11 - koszt_netto) | round(2) }} PLN

            Przychód eksportu: {{ eksport_p | round(2) }} PLN
            Koszt ładowania pod sprzedaż: {{ koszt_ladowania_pod_sprzedaz | round(2) }} PLN
            💰 Zysk ze sprzedaży: {{ zysk_sprzedazy | round(2) }} PLN

      # Zeruj akumulatory
      - service: var.set
        data:
          entity_id: var.finanse_import_koszt_dzis_pln
          value: 0
      - service: var.set
        data:
          entity_id: var.finanse_eksport_przychod_dzis_pln
          value: 0
      - service: var.set
        data:
          entity_id: var.finanse_kontrafakt_g12_dzis_pln
          value: 0
      - service: var.set
        data:
          entity_id: var.finanse_kontrafakt_g11_dzis_pln
          value: 0
      - service: var.set
        data:
          entity_id: var.finanse_koszt_ladowania_pod_sprzedaz_dzis_pln
          value: 0

  # Reset cyklu 6-6: zapisz poprzedni, akumuluj skum, zeruj, powiadom
  - id: finanse_pv_reset_cykl_0600
    alias: "Finanse PV: reset cyklu 6-6 o 06:00"
    trigger:
      - platform: time
        at: "06:00:00"
    action:
      - variables:
          eksport_tanio_kwh: "{{ states('var.finanse_cykl_eksport_tanio_kwh') | float(0) }}"
          eksport_tanio_strata: "{{ states('var.finanse_cykl_eksport_tanio_strata_pln') | float(0) }}"
          import_noc_kwh: "{{ states('var.finanse_cykl_import_noc_kwh') | float(0) }}"
          import_noc_pln: "{{ states('var.finanse_cykl_import_noc_pln') | float(0) }}"
          eksport_dobry_kwh: "{{ states('var.finanse_cykl_eksport_dobry_kwh') | float(0) }}"
          eksport_dobry_pln: "{{ states('var.finanse_cykl_eksport_dobry_pln') | float(0) }}"
          strata_laczna: "{{ states('var.finanse_cykl_eksport_tanio_strata_pln') | float(0) + states('var.finanse_cykl_import_noc_pln') | float(0) }}"

      # Zapisz poprzedni cykl
      - service: var.set
        data:
          entity_id: var.finanse_cykl_prev_eksport_tanio_kwh
          value: "{{ eksport_tanio_kwh | round(4) }}"
      - service: var.set
        data:
          entity_id: var.finanse_cykl_prev_eksport_tanio_strata_pln
          value: "{{ eksport_tanio_strata | round(4) }}"
      - service: var.set
        data:
          entity_id: var.finanse_cykl_prev_import_noc_kwh
          value: "{{ import_noc_kwh | round(4) }}"
      - service: var.set
        data:
          entity_id: var.finanse_cykl_prev_import_noc_pln
          value: "{{ import_noc_pln | round(4) }}"
      - service: var.set
        data:
          entity_id: var.finanse_cykl_prev_eksport_dobry_kwh
          value: "{{ eksport_dobry_kwh | round(4) }}"
      - service: var.set
        data:
          entity_id: var.finanse_cykl_prev_eksport_dobry_pln
          value: "{{ eksport_dobry_pln | round(4) }}"
      - service: var.set
        data:
          entity_id: var.finanse_cykl_prev_strata_laczna_pln
          value: "{{ strata_laczna | round(4) }}"

      # Dodaj do skumulowanych
      - service: var.set
        data:
          entity_id: var.finanse_cykl_skum_eksport_tanio_kwh
          value: >
            {{ (states('var.finanse_cykl_skum_eksport_tanio_kwh') | float(0) + eksport_tanio_kwh) | round(4) }}
      - service: var.set
        data:
          entity_id: var.finanse_cykl_skum_eksport_tanio_strata_pln
          value: >
            {{ (states('var.finanse_cykl_skum_eksport_tanio_strata_pln') | float(0) + eksport_tanio_strata) | round(4) }}
      - service: var.set
        data:
          entity_id: var.finanse_cykl_skum_import_noc_kwh
          value: >
            {{ (states('var.finanse_cykl_skum_import_noc_kwh') | float(0) + import_noc_kwh) | round(4) }}
      - service: var.set
        data:
          entity_id: var.finanse_cykl_skum_import_noc_pln
          value: >
            {{ (states('var.finanse_cykl_skum_import_noc_pln') | float(0) + import_noc_pln) | round(4) }}
      - service: var.set
        data:
          entity_id: var.finanse_cykl_skum_strata_laczna_pln
          value: >
            {{ (states('var.finanse_cykl_skum_strata_laczna_pln') | float(0) + strata_laczna) | round(4) }}
      - service: var.set
        data:
          entity_id: var.finanse_cykl_skum_eksport_dobry_kwh
          value: >
            {{ (states('var.finanse_cykl_skum_eksport_dobry_kwh') | float(0) + eksport_dobry_kwh) | round(4) }}
      - service: var.set
        data:
          entity_id: var.finanse_cykl_skum_eksport_dobry_pln
          value: >
            {{ (states('var.finanse_cykl_skum_eksport_dobry_pln') | float(0) + eksport_dobry_pln) | round(4) }}

      # Powiadomienie
      - service: script.ems_notify
        data:
          title: "🔋 Straty magazynu – cykl {{ (now() - timedelta(days=1)).strftime('%d.%m') }} 06:00 → {{ now().strftime('%d.%m') }} 06:00"
          message: >
            ❌ Eksport za tanio:  {{ eksport_tanio_kwh | round(2) }} kWh → strata {{ eksport_tanio_strata | round(2) }} PLN
            🌙 Import nocny:      {{ import_noc_kwh | round(2) }} kWh → koszt  {{ import_noc_pln | round(2) }} PLN
            ──────────────────────────────
            💸 Łączna strata cyklu: {{ strata_laczna | round(2) }} PLN
            ✅ Dobry eksport:     {{ eksport_dobry_kwh | round(2) }} kWh → przychód {{ eksport_dobry_pln | round(2) }} PLN

            📊 Skumulowana strata (dożywotnia): {{ (states('var.finanse_cykl_skum_strata_laczna_pln') | float(0)) | round(2) }} PLN

      # Zeruj bieżący cykl
      - service: var.set
        data:
          entity_id: var.finanse_cykl_eksport_tanio_kwh
          value: 0
      - service: var.set
        data:
          entity_id: var.finanse_cykl_eksport_tanio_strata_pln
          value: 0
      - service: var.set
        data:
          entity_id: var.finanse_cykl_import_noc_kwh
          value: 0
      - service: var.set
        data:
          entity_id: var.finanse_cykl_import_noc_pln
          value: 0
      - service: var.set
        data:
          entity_id: var.finanse_cykl_eksport_dobry_kwh
          value: 0
      - service: var.set
        data:
          entity_id: var.finanse_cykl_eksport_dobry_pln
          value: 0
