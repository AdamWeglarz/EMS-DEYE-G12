###############################################################################
# FINANSE PV – śledzenie oszczędności / kosztów instalacji PV+magazyn
#
# Metodologia: Actual vs Counterfactual
#   Oszczędność = Koszt_kontrafaktyczny − Koszt_rzeczywisty_netto
#   Koszt_kontrafaktyczny   = Σ(Δkonsumpcja × cena_G12_lub_G11)
#   Koszt_rzeczywisty_netto = Σ(Δimport × G12) − Σ(Δeksport × RCE_spot)
#
# Źródła:
#   import/eksport: sensor.solarman_total_energy_bought/sold_safe (ciągłe)
#   konsumpcja:     sensor.solarman_total_load_consumption_safe (ciągłe)
#   cena RCE:       state_attr('sensor.rce_prices_today_scaled','value') per slot
#   G12:            var.magazyn_koszt_calkowity_strefa_drozsza/tansza_pln_kwh
#   G11:            var.g11_cena_kwh = 0.96 PLN/kWh (flat)
#   G12 tańsza:     13:00-15:00 i 22:00-06:00
#   G12 droższa:    reszta
#
# Akumulacja: co 15 min, reset o 23:59:00
###############################################################################

var:

  # ── Konfiguracja cen ────────────────────────────────────────────────────────

  g11_cena_kwh:
    unique_id: "g11_cena_kwh"
    friendly_name: "Taryfa G11 – cena całkowita"
    icon: "mdi:currency-usd"
