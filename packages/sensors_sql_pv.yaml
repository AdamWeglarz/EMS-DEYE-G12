###############################################################################
# SQL SENSORY – zarządzanie PV / magazynem
# Oddzielny plik – configuration.yaml zawiera hasła do bazy danych
###############################################################################

sql:
  - name: "Oddana energia biezacy slot 15min"
    unique_id: "sql_energy_sold_current_slot_15min"
    query: >
      SELECT ROUND(MAX(st.sum) - MIN(st.sum), 4) AS value
      FROM statistics_short_term st
      JOIN statistics_meta sm ON st.metadata_id = sm.id
      WHERE sm.statistic_id = 'sensor.solarman_total_energy_sold_safe'
        AND st.start_ts >= FLOOR((UNIX_TIMESTAMP(NOW()) - 5) / 900) * 900
        AND st.start_ts <  FLOOR((UNIX_TIMESTAMP(NOW()) - 5) / 900) * 900 + 900;
    column: "value"
    unit_of_measurement: "kWh"

  - name: "Oddana energia dzis 6-13"
    unique_id: "sql_energy_sold_today_0613"
    query: >
      SELECT ROUND(MAX(st.sum) - MIN(st.sum), 4) AS value
      FROM statistics_short_term st
      JOIN statistics_meta sm ON st.metadata_id = sm.id
      WHERE sm.statistic_id = 'sensor.solarman_total_energy_sold_safe'
        AND st.start_ts >= UNIX_TIMESTAMP(CONCAT(DATE(NOW()), ' 06:00:00'))
        AND st.start_ts <  UNIX_TIMESTAMP(CONCAT(DATE(NOW()), ' 13:00:00'));
    column: "value"
    unit_of_measurement: "kWh"

  - name: "Oddana energia dzis 15-22"
    unique_id: "sql_energy_sold_today_1522"
    query: >
      SELECT ROUND(MAX(st.sum) - MIN(st.sum), 4) AS value
      FROM statistics_short_term st
      JOIN statistics_meta sm ON st.metadata_id = sm.id
      WHERE sm.statistic_id = 'sensor.solarman_total_energy_sold_safe'
        AND st.start_ts >= UNIX_TIMESTAMP(CONCAT(DATE(NOW()), ' 15:00:00'))
        AND st.start_ts <  UNIX_TIMESTAMP(CONCAT(DATE(NOW()), ' 22:00:00'));
    column: "value"
    unit_of_measurement: "kWh"

  - name: "Srednie zuzycie o obecnej godzinie"
    unique_id: "sql_avg_usage_current_hour"
    query: >
      SELECT AVG(corrected_diff) AS value
      FROM (
        SELECT
          CASE
            WHEN diff < 0 OR diff > 20 THEN default_kwh
            ELSE diff
          END AS corrected_diff
        FROM (
          SELECT
            (MAX(CAST(s.state AS DECIMAL(10,3))) - MIN(CAST(s.state AS DECIMAL(10,3)))) AS diff,
            (
              SELECT CAST(v.state AS DECIMAL(10,3))
              FROM states v
              JOIN states_meta vm ON v.metadata_id = vm.metadata_id
              WHERE vm.entity_id = 'var.magazyn_konsumpcja_default_kwh_h'
                AND v.state NOT IN ('unknown', 'unavailable', '')
              ORDER BY v.last_updated_ts DESC
              LIMIT 1
            ) AS default_kwh
          FROM states s
          JOIN states_meta m ON s.metadata_id = m.metadata_id
          WHERE m.entity_id = 'sensor.solarman_total_load_consumption'
            AND s.state NOT IN ('unknown', 'unavailable', '')
            AND HOUR(FROM_UNIXTIME(s.last_updated_ts)) = HOUR(NOW())
            AND DATE(FROM_UNIXTIME(s.last_updated_ts)) < CURDATE()
            AND s.last_updated_ts > (UNIX_TIMESTAMP(NOW()) - 2592000)
          GROUP BY DATE(FROM_UNIXTIME(s.last_updated_ts))
        ) AS daily
      ) AS subquery;
    column: "value"
    unit_of_measurement: "kWh"

  - name: "Srednie zuzycie w obecnym slocie 30min"
    unique_id: "sql_avg_usage_current_slot_30min"
    query: >
      SELECT AVG(corrected_diff) AS value
      FROM (
        SELECT
          CASE
            WHEN diff < 0 OR diff > 10 THEN default_kwh
            ELSE diff
          END AS corrected_diff
        FROM (
          SELECT
            (MAX(CAST(s.state AS DECIMAL(10,3))) - MIN(CAST(s.state AS DECIMAL(10,3)))) AS diff,
            (
              SELECT CAST(v.state AS DECIMAL(10,3)) / 2
              FROM states v
              JOIN states_meta vm ON v.metadata_id = vm.metadata_id
              WHERE vm.entity_id = 'var.magazyn_konsumpcja_default_kwh_h'
                AND v.state NOT IN ('unknown', 'unavailable', '')
              ORDER BY v.last_updated_ts DESC
              LIMIT 1
            ) AS default_kwh
          FROM states s
          JOIN states_meta m ON s.metadata_id = m.metadata_id
          WHERE m.entity_id = 'sensor.solarman_total_load_consumption'
            AND s.state NOT IN ('unknown', 'unavailable', '')
            AND HOUR(FROM_UNIXTIME(s.last_updated_ts)) = HOUR(NOW())
            AND FLOOR(MINUTE(FROM_UNIXTIME(s.last_updated_ts)) / 30) = FLOOR(MINUTE(NOW()) / 30)
            AND DATE(FROM_UNIXTIME(s.last_updated_ts)) < CURDATE()
            AND s.last_updated_ts > (UNIX_TIMESTAMP(NOW()) - 2592000)
          GROUP BY DATE(FROM_UNIXTIME(s.last_updated_ts))
        ) AS daily
      ) AS subquery;
    column: "value"
    unit_of_measurement: "kWh"
