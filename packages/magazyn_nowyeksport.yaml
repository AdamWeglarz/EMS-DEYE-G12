###############################################################################
# ODDAWANIE PORANNE DO SIECI (06:00–13:00)
# PLAN + EXEC v13.0
#
# LOGIKA:
# - var.spill_poranny = fizyczny spill od teraz do końca produkcji PV
# - forecast pobierany bezpośrednio w pack
# - parser PV oparty o item.period_start (datetime)
# - bez as_datetime / as_local
#
# PROGI CENOWE:
# - PV spill: próg = min_zysk_sprzedaz
# - BAT spill: próg = koszt_tansza
# - BAT semi: próg = koszt_tansza + min_zysk_sprzedaz
# - BAT full: próg = koszt_drozsza + min_zysk_sprzedaz
#
# ZASADY:
# - PV oddajemy tylko jeśli realnie występuje spill PV w slocie
# - BAT spill działa tylko do fizycznego spillu i z ochroną 30% SOC
# - BAT semi działa bez limitu spillu, ale z celem minimum 50% o 13:00
# - BAT full działa bez limitu spillu i tylko do technicznego minimum min_soc_dynamic_13
# - dodatkowy floor: var.magazyn_soc_min_rano_percent — żaden tryb BAT nie zejdzie poniżej tego SOC
# - dodatkowy raport godzinowy 06:00–13:00
###############################################################################


automation:
  - alias: "Magazyn: Oddawanie poranne (06-13) plan+exec PV+BAT v13.1"
    id: magazyn_oddawanie_poranne_v13_1_spill_real_overflow
    mode: single
    description: >
      Poranny eksport 06:00–13:00:
      - var.spill_poranny = realny fizyczny spill liczony od teraz do końca produkcji PV
      - spill = tylko overflow ponad pojemność magazynu
      - PV spill od min_zysk_sprzedaz
      - BAT spill od koszt_tansza, tylko do realnego spillu i z floor 30%
      - BAT semi od koszt_tansza + min_zysk_sprzedaz, bez limitu spillu, z celem min. 50% o 13:00
      - BAT full od koszt_drozsza + min_zysk_sprzedaz, bez limitu spillu, do min_soc_dynamic_13
      - dodatkowy floor: var.magazyn_soc_min_rano_percent — blokuje eksport BAT poniżej tego SOC

    trigger:
      - platform: time
        at: "06:00:00"
      - platform: time
        at: "06:15:00"
      - platform: time
        at: "06:30:00"
      - platform: time
        at: "06:45:00"
      - platform: time
        at: "07:00:00"
      - platform: time
        at: "07:15:00"
      - platform: time
        at: "07:30:00"
      - platform: time
        at: "07:45:00"
      - platform: time
        at: "08:00:00"
      - platform: time
        at: "08:15:00"
      - platform: time
        at: "08:30:00"
      - platform: time
        at: "08:45:00"
      - platform: time
        at: "09:00:00"
      - platform: time
        at: "09:15:00"
      - platform: time
        at: "09:30:00"
      - platform: time
        at: "09:45:00"
      - platform: time
        at: "10:00:00"
      - platform: time
        at: "10:15:00"
      - platform: time
        at: "10:30:00"
      - platform: time
        at: "10:45:00"
      - platform: time
        at: "11:00:00"
      - platform: time
        at: "11:15:00"
      - platform: time
        at: "11:30:00"
      - platform: time
        at: "11:45:00"
      - platform: time
        at: "12:00:00"
      - platform: time
        at: "12:15:00"
      - platform: time
        at: "12:30:00"
      - platform: time
        at: "12:45:00"
      - platform: time
        at: "13:00:00"

    action:
      - variables:
          spill_left_prev: "{{ states('var.spill_poranny') | float(0) }}"
          energy_sold: "{{ states('sensor.solarman_daily_energy_sold') | float(0) }}"
          soc_current: "{{ states('sensor.solarman_battery') | float(0) }}"
          was_pv_discharging: "{{ is_state('input_boolean.pv_discharge_to_grid', 'on') }}"
          was_battery_discharging: "{{ is_state('input_boolean.battery_discharge_to_grid', 'on') }}"

          tz_to: "{{ now().strftime('%z') }}"
          h_now: "{{ now().hour }}"
          m_now: "{{ now().minute }}"
          now_hm: "{{ now().strftime('%H:%M') }}"

          koszt_tansza: "{{ states('var.magazyn_koszt_calkowity_strefa_tansza_pln_kwh') | float(0) }}"
          koszt_drozsza: "{{ states('var.magazyn_koszt_calkowity_strefa_drozsza_pln_kwh') | float(0) }}"
          min_zysk_sprzedaz: "{{ states('var.magazyn_min_zysk_sprzedaz_pln_kwh') | float(0) }}"

          spill_pv_min_price: "{{ states('var.magazyn_min_zysk_sprzedaz_pln_kwh') | float(0) }}"
          spill_bat_min_price: "{{ states('var.magazyn_koszt_calkowity_strefa_tansza_pln_kwh') | float(0) }}"
          semi_bat_min_price: >
            {{ (states('var.magazyn_koszt_calkowity_strefa_tansza_pln_kwh') | float(0))
               + (states('var.magazyn_min_zysk_sprzedaz_pln_kwh') | float(0)) }}
          full_bat_min_price: >
            {{ (states('var.magazyn_koszt_calkowity_strefa_drozsza_pln_kwh') | float(0))
               + (states('var.magazyn_min_zysk_sprzedaz_pln_kwh') | float(0)) }}

          pojemnosc_kwh: "{{ states('var.magazyn_pojemnosc_brutto_kwh') | float(15) }}"
          soc_floor_pct: "{{ states('var.magazyn_soc_floor_percent') | float(20) }}"
          soc_comfort_pct: "{{ states('var.magazyn_soc_comfort_percent') | float(25) }}"
          spill_bat_soc_min_pct: "{{ states('var.magazyn_soc_spill_bat_floor_percent') | float(30) }}"
          soc_min_rano_pct: "{{ states('var.magazyn_soc_min_rano_percent') | float(25) }}"
          semi_soc_target_13_pct: "{{ states('var.cel_naladowania_o_13') | float(50) }}"
          soc_buffer_mid_pct: "{{ states('var.magazyn_soc_buffer_mid_percent') | float(5) }}"
          max_moc_rozladowania_kw: "{{ states('var.magazyn_max_moc_rozladowania_kw') | float(6) }}"

          cons_mult: "{{ states('var.magazyn_konsumpcja_multiplier') | float(1.15) }}"
          cons_default: "{{ states('var.magazyn_konsumpcja_default_kwh_h') | float(1.5) }}"
          urlop_kwh_h: "{{ states('var.magazyn_konsumpcja_urlop_kwh_h') | float(0.5) }}"
          sprzatanie_mult: "{{ states('var.magazyn_konsumpcja_mult_sprzatanie') | float(2.0) }}"
          lookback_sec: "{{ (states('var.magazyn_sql_lookback_days_ladowanie') | int(7)) * 86400 }}"

          ceny_data: "{{ state_attr('sensor.rce_prices_today_scaled', 'value') or [] }}"

      - service: sql.query
        data:
          query: >
            SELECT
              HOUR(CONVERT_TZ(FROM_UNIXTIME(s.last_updated_ts), '+00:00', '{{ tz_to[0:3] ~ ":" ~ tz_to[3:5] }}')) AS h,
              AVG(CAST(s.state AS DECIMAL(10,3))) AS avg_h
            FROM states s
            JOIN states_meta m ON s.metadata_id = m.metadata_id
            WHERE m.entity_id = 'sensor.srednie_zuzycie_o_obecnej_godzinie'
              AND s.state NOT IN ('unknown', 'unavailable', '')
              AND s.last_updated_ts > (UNIX_TIMESTAMP(NOW()) - {{ lookback_sec }})
              AND HOUR(CONVERT_TZ(FROM_UNIXTIME(s.last_updated_ts), '+00:00', '{{ tz_to[0:3] ~ ":" ~ tz_to[3:5] }}')) BETWEEN {{ h_now }} AND 13
            GROUP BY h
            ORDER BY h;
        response_variable: statystyki_konsumpcji

      - service: calendar.get_events
        target:
          entity_id: calendar.urlop
        data:
          start_date_time: "{{ now().strftime('%Y-%m-%d 00:00:00') }}"
          end_date_time: "{{ now().strftime('%Y-%m-%d 23:59:59') }}"
        response_variable: urlop_events

      - service: calendar.get_events
        target:
          entity_id: calendar.sprzatanie
        data:
          start_date_time: "{{ now().strftime('%Y-%m-%d 00:00:00') }}"
          end_date_time: "{{ now().strftime('%Y-%m-%d 23:59:59') }}"
        response_variable: sprzatanie_events

      - variables:
          pack: >-
            {% set slot_start_min = (m_now // 15) * 15 %}
            {% set slot_start_total = (h_now * 60 + slot_start_min) %}
            {% set forecast_data = state_attr('sensor.solcast_pv_forecast_prognoza_na_dzisiaj', 'detailedHourly') or [] %}
            {% set dzis = now().date() %}
            {% set plan_date = dzis %}

            {# ===== URLOP: lista godzin dla dzisiejszego planu ===== #}
            {% set urlop_list = (urlop_events['calendar.urlop'].events if (urlop_events and 'calendar.urlop' in urlop_events) else []) %}
            {% set urlop_ns = namespace(hours=[]) %}
            {% for ev in urlop_list %}
              {% set es = as_datetime(ev.start) | as_local %}
              {% set ee = as_datetime(ev.end) | as_local %}
              {% for off in range(0, 24) %}
                {% set probe = now().replace(hour=0, minute=30, second=0, microsecond=0) + timedelta(hours=off) %}
                {% if probe >= es and probe < ee %}
                  {% set hk = probe.strftime('%Y-%m-%d %H') %}
                  {% if hk not in urlop_ns.hours %}
                    {% set urlop_ns.hours = urlop_ns.hours + [hk] %}
                  {% endif %}
                {% endif %}
              {% endfor %}
            {% endfor %}
            {% set urlop_hours = urlop_ns.hours %}

            {# ===== SPRZATANIE: lista godzin dla dzisiejszego planu ===== #}
            {% set sprzatanie_list = (sprzatanie_events['calendar.sprzatanie'].events if (sprzatanie_events and 'calendar.sprzatanie' in sprzatanie_events) else []) %}
            {% set sprzatanie_ns = namespace(hours=[]) %}
            {% for ev in sprzatanie_list %}
              {% set es = as_datetime(ev.start) | as_local %}
              {% set ee = as_datetime(ev.end) | as_local %}
              {% for off in range(0, 24) %}
                {% set probe = now().replace(hour=0, minute=30, second=0, microsecond=0) + timedelta(hours=off) %}
                {% if probe >= es and probe < ee %}
                  {% set hk = probe.strftime('%Y-%m-%d %H') %}
                  {% if hk not in sprzatanie_ns.hours %}
                    {% set sprzatanie_ns.hours = sprzatanie_ns.hours + [hk] %}
                  {% endif %}
                {% endif %}
              {% endfor %}
            {% endfor %}
            {% set sprzatanie_hours = sprzatanie_ns.hours %}

            {% set nsS = namespace(period='', price_mwh=0.0) %}
            {% for c in ceny_data %}
              {% if c is mapping and c.period is defined %}
                {% set p = (c.period | string).replace('–','-') %}
                {% set p2 = p.replace(' ', '') %}
                {% if '-' in p2 %}
                  {% set parts = p2.split('-') %}
                  {% set s = parts[0].split(':') %}
                  {% set e = parts[1].split(':') %}
                  {% if s|length == 2 and e|length == 2 %}
                    {% set st = (s[0]|int)*60 + (s[1]|int) %}
                    {% set et = (e[0]|int)*60 + (e[1]|int) %}
                    {% if slot_start_total >= st and slot_start_total < et %}
                      {% set nsS.period = c.period %}
                      {% set nsS.price_mwh = c.rce_pln | float(0) %}
                    {% endif %}
                  {% endif %}
                {% endif %}
              {% endif %}
            {% endfor %}
            {% set current_slot_period = nsS.period %}
            {% set cena_aktualna = nsS.price_mwh %}
            {% set cena_aktualna_kwh = cena_aktualna / 1000 %}

            {% set rows = statystyki_konsumpcji['result'] if (statystyki_konsumpcji is mapping and 'result' in statystyki_konsumpcji) else [] %}
            {% set nsC = namespace(d={}) %}
            {% for row in rows %}
              {% set nsC.d = nsC.d | combine({ (row['h']|int): (row['avg_h']|float(0)) }) %}
            {% endfor %}
            {% set dict_z = nsC.d %}

            {% set dzis_local = now().date() %}
            {% set nsP = namespace(d={}) %}
            {% if forecast_data is iterable and forecast_data is not string %}
              {% for item in forecast_data %}
                {% if item is mapping and item.period_start is defined %}
                  {% set ts = item.period_start %}
                  {% if ts.date() == dzis_local and ts.hour >= 6 and ts.hour <= 21 %}
                    {% set pv_value = item.pv_estimate | float(0) %}
                    {% set nsP.d = nsP.d | combine({ ts.hour: pv_value }) %}
                  {% endif %}
                {% endif %}
              {% endfor %}
            {% endif %}
            {% set pv_d = nsP.d %}

            {# --- koniec produkcji PV wg prognozy (spill liczony do pv_end_excl, fallback 14) --- #}
            {% set nsE = namespace(last=13) %}
            {% for h in range(0, 24) %}
              {% if pv_d.get(h, 0) > 0.1 %}{% set nsE.last = h %}{% endif %}
            {% endfor %}
            {% set pv_end_excl = nsE.last + 1 %}
            {% if pv_end_excl < 14 %}{% set pv_end_excl = 14 %}{% endif %}

            {% set floor_kwh = (pojemnosc_kwh * soc_floor_pct / 100) %}
            {% set max_u = pojemnosc_kwh - floor_kwh %}
            {% set energy_now_kwh = (soc_current / 100) * pojemnosc_kwh %}
            {% set E0_u = energy_now_kwh - floor_kwh %}
            {% if E0_u < 0 %}{% set E0_u = 0 %}{% endif %}
            {% if E0_u > max_u %}{% set E0_u = max_u %}{% endif %}

            {% set E_reserve_u = ((pojemnosc_kwh * soc_comfort_pct / 100) - floor_kwh) %}
            {% if E_reserve_u < 0 %}{% set E_reserve_u = 0 %}{% endif %}
            {% if E_reserve_u > max_u %}{% set E_reserve_u = max_u %}{% endif %}

            {% set current_hour_factor = ((60 - m_now) / 60) | float(0) %}

            {% set ns_cons = namespace(total=0.0) %}
            {% set ns_pv_sum = namespace(total=0.0) %}
            {% for h in range(h_now, 14) %}
              {% set hk = plan_date.strftime('%Y-%m-%d') ~ ' ' ~ '%02d'|format(h) %}
              {% set is_urlop_h = hk in urlop_hours %}
              {% set is_sprzatanie_h = hk in sprzatanie_hours %}
              {% set z_h = (dict_z.get(h, cons_default)) * sprzatanie_mult if is_sprzatanie_h else (urlop_kwh_h if is_urlop_h else (dict_z.get(h, cons_default)) * cons_mult) %}
              {% set pv_h = pv_d.get(h, 0) %}
              {% set factor = current_hour_factor if h == h_now else 1 %}
              {% set z_eff = z_h * factor %}
              {% set pv_eff = pv_h * factor %}
              {% set ns_cons.total = ns_cons.total + z_eff %}
              {% set ns_pv_sum.total = ns_pv_sum.total + pv_eff %}
            {% endfor %}

            {# --- spill liczony do końca produkcji PV --- #}
            {% set ns_spill = namespace(total=0.0, e_u=E0_u, lines='') %}
            {% for h in range(h_now, pv_end_excl) %}
              {% set hk = plan_date.strftime('%Y-%m-%d') ~ ' ' ~ '%02d'|format(h) %}
              {% set is_urlop_h = hk in urlop_hours %}
              {% set is_sprzatanie_h = hk in sprzatanie_hours %}
              {% set z_h = (dict_z.get(h, cons_default)) * sprzatanie_mult if is_sprzatanie_h else (urlop_kwh_h if is_urlop_h else (dict_z.get(h, cons_default)) * cons_mult) %}
              {% set pv_h = pv_d.get(h, 0) %}
              {% set factor = current_hour_factor if h == h_now else 1 %}
              {% set z_eff = z_h * factor %}
              {% set pv_eff = pv_h * factor %}
              {% set d = pv_eff - z_eff %}

              {% set e_raw = ns_spill.e_u + d %}
              {% if e_raw > max_u %}
                {% set spill_h = e_raw - max_u %}
                {% set ns_spill.total = ns_spill.total + spill_h %}
                {% set ns_spill.lines = ns_spill.lines ~
                  "\n- G:" ~ ("%02d:00" % h) ~
                  " | d:" ~ (d|round(2)) ~
                  " | E_raw:" ~ (e_raw|round(2)) ~
                  " | spill:" ~ (spill_h|round(2))
                %}
                {% set ns_spill.e_u = max_u %}
              {% elif e_raw < 0 %}
                {% set ns_spill.e_u = 0 %}
              {% else %}
                {% set ns_spill.e_u = e_raw %}
              {% endif %}
            {% endfor %}
            {% set calkowite_zuzycie_kwh = ns_cons.total %}
            {% set calkowite_pv_kwh = ns_pv_sum.total %}
            {% set spill_fizyczny = ns_spill.total %}
            {% set spill_real_lines = ns_spill.lines %}

            {% set energia_z_baterii = calkowite_zuzycie_kwh - calkowite_pv_kwh %}
            {% if energia_z_baterii < 0 %}{% set energia_z_baterii = 0 %}{% endif %}

            {% set E_min_partial = energia_z_baterii + E_reserve_u %}
            {% set soc_min_dynamic_13 = ((E_min_partial + floor_kwh) / pojemnosc_kwh * 100) | round(0) | int %}
            {% if soc_min_dynamic_13 > 100 %}{% set soc_min_dynamic_13 = 100 %}{% endif %}
            {% if soc_min_dynamic_13 < (soc_floor_pct | int(20)) %}{% set soc_min_dynamic_13 = soc_floor_pct | int(20) %}{% endif %}

            {% set semi_soc_floor_pct = [semi_soc_target_13_pct, soc_min_dynamic_13] | max %}

            {% set rano_floor_kwh = (pojemnosc_kwh * soc_min_rano_pct / 100) %}
            {% set spill_floor_kwh = [pojemnosc_kwh * spill_bat_soc_min_pct / 100, rano_floor_kwh] | max %}
            {% set semi_floor_kwh = [pojemnosc_kwh * semi_soc_floor_pct / 100, rano_floor_kwh] | max %}
            {% set full_floor_kwh = [pojemnosc_kwh * soc_min_dynamic_13 / 100, rano_floor_kwh] | max %}

            {# --- Bilansowanie godzinne 1/2: rezerwa na resztę bieżącej godziny ---
                 Prawo: rozliczanie godzinne (netting w oknie 60 min).
                 Budżet = energia - zużycie_bieżącego_slotu - reserve_po_slocie
                 Przykład: 0.5 kWh, dom zużyje 0.3 kWh w slocie, reserve=0 → eksport 0.2 kWh.
                 SOC stop = floor + reserve_po_slocie #}
            {% set slot_end_min = slot_start_min + 15 %}
            {% set mins_rest_of_hour = 60 - slot_end_min %}
            {% set z_h_eoh = dict_z.get(h_now, cons_default) * cons_mult %}
            {% set pv_h_eoh = pv_d.get(h_now, 0) %}
            {% set house_kwh_this_slot = [z_h_eoh * 15 / 60 - pv_h_eoh * 15 / 60, 0] | max %}
            {% set bat_eoh_reserve = [z_h_eoh * mins_rest_of_hour / 60 - pv_h_eoh * mins_rest_of_hour / 60, 0] | max %}

            {% set battery_budget_spill = [energy_now_kwh - spill_floor_kwh - bat_eoh_reserve - house_kwh_this_slot, 0] | max %}
            {% set battery_budget_semi = [energy_now_kwh - semi_floor_kwh - bat_eoh_reserve - house_kwh_this_slot, 0] | max %}
            {% set battery_budget_full = [energy_now_kwh - full_floor_kwh - bat_eoh_reserve - house_kwh_this_slot, 0] | max %}

            {# --- SOC stop dla straznika: floor dynamiczny + rezerwa do konca godziny --- #}
            {% set soc_stop_full_rano = (((full_floor_kwh + bat_eoh_reserve) / pojemnosc_kwh) * 100) | round(0) | int %}
            {% if soc_stop_full_rano > 100 %}{% set soc_stop_full_rano = 100 %}{% endif %}
            {% if soc_stop_full_rano < soc_min_dynamic_13 %}{% set soc_stop_full_rano = soc_min_dynamic_13 %}{% endif %}

            {% set battery_slot_cap_kwh = max_moc_rozladowania_kw * 0.25 %}
            {% if battery_slot_cap_kwh < 0 %}{% set battery_slot_cap_kwh = 0 %}{% endif %}

            {% set nsFullCand = namespace(list=[]) %}
            {% for c in ceny_data %}
              {% if c is mapping and c.period is defined %}
                {% set p = (c.period | string).replace('–','-') %}
                {% set p2 = p.replace(' ', '') %}
                {% if '-' in p2 %}
                  {% set parts = p2.split('-') %}
                  {% set start = parts[0] %}
                  {% set hm = start.split(':') %}
                  {% if hm|length == 2 %}
                    {% set h = hm[0]|int %}
                    {% set m = hm[1]|int %}
                    {% set st = h * 60 + m %}
                    {% if h >= 6 and h < 13 and st >= slot_start_total %}
                      {% set price_mwh = c.rce_pln | float(0) %}
                      {% set price_kwh = price_mwh / 1000 %}
                      {% if price_kwh >= full_bat_min_price %}
                        {% set pv_h = pv_d.get(h, 0) %}
                        {% set hk = plan_date.strftime('%Y-%m-%d') ~ ' ' ~ '%02d'|format(h) %}
              {% set is_urlop_h = hk in urlop_hours %}
              {% set is_sprzatanie_h = hk in sprzatanie_hours %}
              {% set z_h = (dict_z.get(h, cons_default)) * sprzatanie_mult if is_sprzatanie_h else (urlop_kwh_h if is_urlop_h else (dict_z.get(h, cons_default)) * cons_mult) %}
                        {% set pv_slot_energy = (pv_h - z_h) / 4 %}
                        {% if pv_slot_energy < 0 %}{% set pv_slot_energy = 0 %}{% endif %}
                        {% set nsFullCand.list = nsFullCand.list + [{
                          'period': c.period,
                          'price': price_mwh,
                          'price_kwh': price_kwh,
                          'pv_energy': pv_slot_energy,
                          'bat_cap': battery_slot_cap_kwh,
                          'mode': 'full'
                        }] %}
                      {% endif %}
                    {% endif %}
                  {% endif %}
                {% endif %}
              {% endif %}
            {% endfor %}
            {% set full_sorted = nsFullCand.list | sort(attribute='price', reverse=true) %}
            {% set nsFull = namespace(rem=battery_budget_full, chosen=[], batt_sum=0.0, plan_sum=0.0, lines='') %}
            {% for s in full_sorted %}
              {% if nsFull.rem > 0.001 %}
                {% set batt_use = [s.bat_cap, nsFull.rem] | min %}
                {% if batt_use < 0 %}{% set batt_use = 0 %}{% endif %}
                {% set plan_energy = batt_use + s.pv_energy %}
                {% if plan_energy > 0 %}
                  {% set nsFull.chosen = nsFull.chosen + [{
                    'period': s.period,
                    'price': s.price,
                    'price_kwh': s.price_kwh,
                    'pv_energy': s.pv_energy,
                    'bat_energy': batt_use,
                    'plan_energy': plan_energy,
                    'mode': 'pv_bat_full' if s.pv_energy > 0 and batt_use > 0 else ('bat_full' if batt_use > 0 else 'pv_only')
                  }] %}
                  {% set nsFull.rem = nsFull.rem - batt_use %}
                  {% set nsFull.batt_sum = nsFull.batt_sum + batt_use %}
                  {% set nsFull.plan_sum = nsFull.plan_sum + plan_energy %}
                  {% set nsFull.lines = nsFull.lines ~
                    "\n- " ~ s.period ~
                    " | " ~ (s.price|round(1)) ~ " PLN/MWh" ~
                    " | mode:" ~ ('pv_bat_full' if s.pv_energy > 0 and batt_use > 0 else ('bat_full' if batt_use > 0 else 'pv_only')) ~
                    " | pv:" ~ (s.pv_energy|round(3)) ~ " kWh" ~
                    " | bat:" ~ (batt_use|round(3)) ~ " kWh" ~
                    " | plan:" ~ (plan_energy|round(3)) ~ " kWh"
                  %}
                {% endif %}
              {% endif %}
            {% endfor %}

            {% set semi_rem_budget = battery_budget_semi - nsFull.batt_sum %}
            {% if semi_rem_budget < 0 %}{% set semi_rem_budget = 0 %}{% endif %}
            {% set nsSemiCand = namespace(list=[]) %}
            {% for c in ceny_data %}
              {% if c is mapping and c.period is defined %}
                {% set p = (c.period | string).replace('–','-') %}
                {% set p2 = p.replace(' ', '') %}
                {% if '-' in p2 %}
                  {% set parts = p2.split('-') %}
                  {% set start = parts[0] %}
                  {% set hm = start.split(':') %}
                  {% if hm|length == 2 %}
                    {% set h = hm[0]|int %}
                    {% set m = hm[1]|int %}
                    {% set st = h * 60 + m %}
                    {% if h >= 6 and h < 13 and st >= slot_start_total %}
                      {% set price_mwh = c.rce_pln | float(0) %}
                      {% set price_kwh = price_mwh / 1000 %}
                      {% if price_kwh >= semi_bat_min_price and price_kwh < full_bat_min_price %}
                        {% set pv_h = pv_d.get(h, 0) %}
                        {% set hk = plan_date.strftime('%Y-%m-%d') ~ ' ' ~ '%02d'|format(h) %}
              {% set is_urlop_h = hk in urlop_hours %}
              {% set is_sprzatanie_h = hk in sprzatanie_hours %}
              {% set z_h = (dict_z.get(h, cons_default)) * sprzatanie_mult if is_sprzatanie_h else (urlop_kwh_h if is_urlop_h else (dict_z.get(h, cons_default)) * cons_mult) %}
                        {% set pv_slot_energy = (pv_h - z_h) / 4 %}
                        {% if pv_slot_energy < 0 %}{% set pv_slot_energy = 0 %}{% endif %}
                        {% set nsSemiCand.list = nsSemiCand.list + [{
                          'period': c.period,
                          'price': price_mwh,
                          'price_kwh': price_kwh,
                          'pv_energy': pv_slot_energy,
                          'bat_cap': battery_slot_cap_kwh,
                          'mode': 'semi'
                        }] %}
                      {% endif %}
                    {% endif %}
                  {% endif %}
                {% endif %}
              {% endif %}
            {% endfor %}
            {% set semi_sorted = nsSemiCand.list | sort(attribute='price', reverse=true) %}
            {% set nsSemi = namespace(rem=semi_rem_budget, chosen=[], batt_sum=0.0, plan_sum=0.0, lines='') %}
            {% for s in semi_sorted %}
              {% if nsSemi.rem > 0.001 %}
                {% set batt_use = [s.bat_cap, nsSemi.rem] | min %}
                {% if batt_use < 0 %}{% set batt_use = 0 %}{% endif %}
                {% set plan_energy = batt_use + s.pv_energy %}
                {% if plan_energy > 0 %}
                  {% set nsSemi.chosen = nsSemi.chosen + [{
                    'period': s.period,
                    'price': s.price,
                    'price_kwh': s.price_kwh,
                    'pv_energy': s.pv_energy,
                    'bat_energy': batt_use,
                    'plan_energy': plan_energy,
                    'mode': 'pv_bat_semi' if s.pv_energy > 0 and batt_use > 0 else ('bat_semi' if batt_use > 0 else 'pv_only')
                  }] %}
                  {% set nsSemi.rem = nsSemi.rem - batt_use %}
                  {% set nsSemi.batt_sum = nsSemi.batt_sum + batt_use %}
                  {% set nsSemi.plan_sum = nsSemi.plan_sum + plan_energy %}
                  {% set nsSemi.lines = nsSemi.lines ~
                    "\n- " ~ s.period ~
                    " | " ~ (s.price|round(1)) ~ " PLN/MWh" ~
                    " | mode:" ~ ('pv_bat_semi' if s.pv_energy > 0 and batt_use > 0 else ('bat_semi' if batt_use > 0 else 'pv_only')) ~
                    " | pv:" ~ (s.pv_energy|round(3)) ~ " kWh" ~
                    " | bat:" ~ (batt_use|round(3)) ~ " kWh" ~
                    " | plan:" ~ (plan_energy|round(3)) ~ " kWh"
                  %}
                {% endif %}
              {% endif %}
            {% endfor %}

            {% set spill_rem_budget = battery_budget_spill - nsFull.batt_sum - nsSemi.batt_sum %}
            {% if spill_rem_budget < 0 %}{% set spill_rem_budget = 0 %}{% endif %}
            {% set nsSpillCand = namespace(list=[]) %}
            {% for c in ceny_data %}
              {% if c is mapping and c.period is defined %}
                {% set p = (c.period | string).replace('–','-') %}
                {% set p2 = p.replace(' ', '') %}
                {% if '-' in p2 %}
                  {% set parts = p2.split('-') %}
                  {% set start = parts[0] %}
                  {% set hm = start.split(':') %}
                  {% if hm|length == 2 %}
                    {% set h = hm[0]|int %}
                    {% set m = hm[1]|int %}
                    {% set st = h * 60 + m %}
                    {% if h >= 6 and h < 13 and st >= slot_start_total %}
                      {% set price_mwh = c.rce_pln | float(0) %}
                      {% set price_kwh = price_mwh / 1000 %}
                      {% if price_kwh >= spill_pv_min_price and price_kwh < semi_bat_min_price %}
                        {% set pv_h = pv_d.get(h, 0) %}
                        {% set hk = plan_date.strftime('%Y-%m-%d') ~ ' ' ~ '%02d'|format(h) %}
              {% set is_urlop_h = hk in urlop_hours %}
              {% set is_sprzatanie_h = hk in sprzatanie_hours %}
              {% set z_h = (dict_z.get(h, cons_default)) * sprzatanie_mult if is_sprzatanie_h else (urlop_kwh_h if is_urlop_h else (dict_z.get(h, cons_default)) * cons_mult) %}
                        {% set pv_slot_energy = (pv_h - z_h) / 4 %}
                        {% if pv_slot_energy < 0 %}{% set pv_slot_energy = 0 %}{% endif %}
                        {% set nsSpillCand.list = nsSpillCand.list + [{
                          'period': c.period,
                          'price': price_mwh,
                          'price_kwh': price_kwh,
                          'pv_energy': pv_slot_energy,
                          'bat_cap': battery_slot_cap_kwh if price_kwh >= spill_bat_min_price else 0,
                          'mode': 'spill'
                        }] %}
                      {% endif %}
                    {% endif %}
                  {% endif %}
                {% endif %}
              {% endif %}
            {% endfor %}
            {% set spill_sorted = nsSpillCand.list | sort(attribute='price', reverse=true) %}
            {% set nsSpillPlan = namespace(rem_spill=spill_fizyczny, rem_bat=spill_rem_budget, chosen=[], plan_sum=0.0, batt_sum=0.0, lines='') %}
            {% for s in spill_sorted %}
              {% if nsSpillPlan.rem_spill > 0.001 %}
                {% set pv_take = [s.pv_energy, nsSpillPlan.rem_spill] | min %}
                {% if pv_take < 0 %}{% set pv_take = 0 %}{% endif %}
                {% set rem_after_pv = nsSpillPlan.rem_spill - pv_take %}
                {% if rem_after_pv < 0 %}{% set rem_after_pv = 0 %}{% endif %}
                {% set batt_take = [s.bat_cap, nsSpillPlan.rem_bat, rem_after_pv] | min %}
                {% if batt_take < 0 %}{% set batt_take = 0 %}{% endif %}
                {% set plan_energy = pv_take + batt_take %}
                {% if plan_energy > 0 %}
                  {% set slot_mode = 'pv_only' %}
                  {% if pv_take > 0 and batt_take > 0 %}
                    {% set slot_mode = 'pv_bat_spill' %}
                  {% endif %}
                  {% set nsSpillPlan.chosen = nsSpillPlan.chosen + [{
                    'period': s.period,
                    'price': s.price,
                    'price_kwh': s.price_kwh,
                    'pv_energy': pv_take,
                    'bat_energy': batt_take,
                    'plan_energy': plan_energy,
                    'mode': slot_mode
                  }] %}
                  {% set nsSpillPlan.rem_spill = nsSpillPlan.rem_spill - plan_energy %}
                  {% if nsSpillPlan.rem_spill < 0 %}{% set nsSpillPlan.rem_spill = 0 %}{% endif %}
                  {% set nsSpillPlan.rem_bat = nsSpillPlan.rem_bat - batt_take %}
                  {% if nsSpillPlan.rem_bat < 0 %}{% set nsSpillPlan.rem_bat = 0 %}{% endif %}
                  {% set nsSpillPlan.plan_sum = nsSpillPlan.plan_sum + plan_energy %}
                  {% set nsSpillPlan.batt_sum = nsSpillPlan.batt_sum + batt_take %}
                  {% set nsSpillPlan.lines = nsSpillPlan.lines ~
                    "\n- " ~ s.period ~
                    " | " ~ (s.price|round(1)) ~ " PLN/MWh" ~
                    " | mode:" ~ slot_mode ~
                    " | pv:" ~ (pv_take|round(3)) ~ " kWh" ~
                    " | bat:" ~ (batt_take|round(3)) ~ " kWh" ~
                    " | plan:" ~ (plan_energy|round(3)) ~ " kWh"
                  %}
                {% endif %}
              {% endif %}
            {% endfor %}

            {% set chosen_all = nsFull.chosen + nsSemi.chosen + nsSpillPlan.chosen %}
            {% set nsPlan = namespace(periods=[], modes={}) %}
            {% for s in chosen_all %}
              {% set nsPlan.periods = nsPlan.periods + [s.period] %}
              {% set nsPlan.modes = nsPlan.modes | combine({ s.period: s.mode }) %}
            {% endfor %}
            {% set plan_list = nsPlan.periods %}
            {% set plan_modes = nsPlan.modes %}
            {% set in_plan_now = (current_slot_period in plan_list) %}
            {% set current_mode = plan_modes.get(current_slot_period, 'none') %}

            {% set nsCur = namespace(
              pv_slot_energy=0.0,
              bat_slot_energy=0.0,
              plan_energy=0.0,
              mode='none',
              price_zone='none',
              hour_cons=0.0,
              hour_pv=0.0
            ) %}
            {% for s in chosen_all %}
              {% if s.period == current_slot_period %}
                {% set nsCur.pv_slot_energy = s.pv_energy %}
                {% set nsCur.bat_slot_energy = s.bat_energy %}
                {% set nsCur.plan_energy = s.plan_energy %}
                {% set nsCur.mode = s.mode %}
                {% if s.price_kwh >= full_bat_min_price %}
                  {% set nsCur.price_zone = 'bat_full' %}
                {% elif s.price_kwh >= semi_bat_min_price %}
                  {% set nsCur.price_zone = 'bat_semi' %}
                {% elif s.price_kwh >= spill_bat_min_price %}
                  {% set nsCur.price_zone = 'bat_spill' %}
                {% elif s.price_kwh >= spill_pv_min_price %}
                  {% set nsCur.price_zone = 'pv_spill' %}
                {% else %}
                  {% set nsCur.price_zone = 'none' %}
                {% endif %}
                {% set cur_h = now().hour %}
                {% set cur_hk = plan_date.strftime('%Y-%m-%d') ~ ' ' ~ '%02d'|format(cur_h) %}
                {% set cur_is_urlop = cur_hk in urlop_hours %}
                {% set cur_is_sprzatanie = cur_hk in sprzatanie_hours %}
                {% set nsCur.hour_cons = (dict_z.get(cur_h, cons_default)) * sprzatanie_mult if cur_is_sprzatanie else (urlop_kwh_h if cur_is_urlop else ((dict_z.get(cur_h, cons_default)) * cons_mult)) %}
                {% set nsCur.hour_pv = (pv_d.get(cur_h, 0)) %}
              {% endif %}
            {% endfor %}

            {% set pv_power_5m_w = states('sensor.srednia_moc_z_pv_5_minut') | float(0) %}
            {% set house_power_5m_w = states('sensor.srednia_moc_pobierana_przez_dom_2_5_minut') | float(0) %}
            {% if house_power_5m_w < 0 %}{% set house_power_5m_w = 0 %}{% endif %}
            {% set pv_surplus_min_w = house_power_5m_w * 1.25 %}
            {% set pv_surplus_5m_ok = (pv_power_5m_w >= pv_surplus_min_w) %}

            {% set pv_can_export_now = (cena_aktualna_kwh >= spill_pv_min_price and pv_surplus_5m_ok) %}
            {% set battery_can_export_now = false %}
            {% if soc_current <= soc_min_rano_pct %}
              {% set battery_can_export_now = false %}
            {% elif current_mode in ['pv_bat_full', 'bat_full'] %}
              {% if cena_aktualna_kwh >= full_bat_min_price and soc_current > soc_min_dynamic_13 %}
                {% set battery_can_export_now = true %}
              {% endif %}
            {% elif current_mode in ['pv_bat_semi', 'bat_semi'] %}
              {% if cena_aktualna_kwh >= semi_bat_min_price and soc_current > semi_soc_floor_pct %}
                {% set battery_can_export_now = true %}
              {% endif %}
            {% elif current_mode in ['pv_bat_spill', 'bat_spill'] %}
              {% if cena_aktualna_kwh >= spill_bat_min_price and soc_current > spill_bat_soc_min_pct %}
                {% set battery_can_export_now = true %}
              {% endif %}
            {% endif %}

            {% set plan_sum = nsFull.plan_sum + nsSemi.plan_sum + nsSpillPlan.plan_sum %}
            {% set pozostalo = spill_fizyczny %}
            {% set plan_total_with_sold = energy_sold + plan_sum %}
            {% set top_lines = nsFull.lines ~ nsSemi.lines ~ nsSpillPlan.lines %}

            {% set nsRpt = namespace(lines='', e_u=E0_u, s=0.0) %}
            {% for h in range(h_now, pv_end_excl) %}
              {% set hk = plan_date.strftime('%Y-%m-%d') ~ ' ' ~ '%02d'|format(h) %}
              {% set is_urlop_h = hk in urlop_hours %}
              {% set is_sprzatanie_h = hk in sprzatanie_hours %}
              {% set z_h = (dict_z.get(h, cons_default)) * sprzatanie_mult if is_sprzatanie_h else (urlop_kwh_h if is_urlop_h else (dict_z.get(h, cons_default)) * cons_mult) %}
              {% set pv_h = pv_d.get(h, 0) %}
              {% set factor = current_hour_factor if h == h_now else 1 %}
              {% set z_eff = z_h * factor %}
              {% set pv_eff = pv_h * factor %}
              {% set d = pv_eff - z_eff %}
              {% set nsRpt.s = nsRpt.s + d %}
              {% set e_u_next = nsRpt.e_u + d %}
              {% if e_u_next < 0 %}{% set e_u_next = 0 %}{% endif %}
              {% if e_u_next > max_u %}{% set e_u_next = max_u %}{% endif %}
              {% set soc_next = ((e_u_next + floor_kwh) / pojemnosc_kwh * 100) | round(0) | int %}
              {% set nsRpt.lines = nsRpt.lines ~
                "\nG:" ~ ("%02d:00" % h) ~
                " | Z:" ~ (z_eff|round(2)) ~
                " | PV:" ~ (pv_eff|round(2)) ~
                " | d:" ~ (d|round(2)) ~
                " | S:" ~ (nsRpt.s|round(2)) ~
                " | E_u:" ~ (e_u_next|round(2)) ~ "kWh" ~
                " | SOC:" ~ soc_next ~ "%"
              %}
              {% set nsRpt.e_u = e_u_next %}
            {% endfor %}

            {% set pv_hours_debug =
              (forecast_data | length if forecast_data is iterable else 0)
              ~ '/' ~ (pv_d | length)
              ~ ' | pv_d=' ~ pv_d
            %}

            {% set raport_stat =
              "Raport:" ~
              "\nG:START | E_u:" ~ (E0_u|round(2)) ~ "kWh | SOC:" ~ (soc_current|round(1)) ~ "% | TZ:" ~ tz_to ~
              "\nSpill_fizyczny_kWh:" ~ (spill_fizyczny|round(2)) ~
              "\nPV_06_13_kWh:" ~ (calkowite_pv_kwh|round(2)) ~
              "\nSQL rows:" ~ (rows|count) ~ " | dict_z:" ~ dict_z ~
              "\nAktualna godzina: " ~ h_now ~ ":00" ~
              nsRpt.lines
            %}

            {{ current_slot_period }}###{{ cena_aktualna|round(2) }}###{{ plan_list|join('|') }}###{{ in_plan_now }}###{{ (chosen_all|count) }}###{{ (plan_list|count) }}###{{ plan_sum|round(2) }}###{{ pozostalo|round(2) }}###{{ top_lines }}###{{ pv_hours_debug }}###{{ soc_min_dynamic_13 }}###{{ cena_aktualna_kwh|round(4) }}###{{ 'YES' if battery_can_export_now else 'NO' }}###{{ E0_u|round(2) }}###{{ E_min_partial|round(2) }}###{{ E_reserve_u|round(2) }}###{{ calkowite_zuzycie_kwh|round(2) }}###{{ calkowite_pv_kwh|round(2) }}###{{ energia_z_baterii|round(2) }}###{{ spill_pv_min_price|round(3) }}###{{ spill_bat_min_price|round(3) }}###{{ semi_bat_min_price|round(3) }}###{{ full_bat_min_price|round(3) }}###{{ current_mode }}###{{ 'YES' if pv_can_export_now else 'NO' }}###{{ plan_total_with_sold|round(2) }}###{{ battery_budget_spill|round(2) }}###{{ battery_budget_semi|round(2) }}###{{ battery_budget_full|round(2) }}###{{ battery_slot_cap_kwh|round(2) }}###{{ nsCur.pv_slot_energy|round(3) }}###{{ nsCur.bat_slot_energy|round(3) }}###{{ nsCur.plan_energy|round(3) }}###{{ nsCur.mode }}###{{ nsCur.price_zone }}###{{ nsCur.hour_cons|round(3) }}###{{ nsCur.hour_pv|round(3) }}###{{ semi_soc_floor_pct }}###{{ spill_bat_soc_min_pct }}###{{ raport_stat }}###{{ spill_real_lines }}###{{ pv_end_excl }}###{{ pv_power_5m_w | round(1) }}###{{ house_power_5m_w | round(1) }}###{{ pv_surplus_min_w | round(1) }}###{{ 'YES' if pv_surplus_5m_ok else 'NO' }}###{{ soc_stop_full_rano }}###{{ house_kwh_this_slot | round(3) }}

      - variables:
          current_slot_period: "{{ pack.split('###')[0] }}"
          cena_aktualna: "{{ pack.split('###')[1] | float(0) }}"
          plan_slotow: "{{ pack.split('###')[2] }}"
          plan_list: "{{ plan_slotow.split('|') if plan_slotow|length > 0 else [] }}"
          in_plan_now: "{{ pack.split('###')[3] == 'True' }}"
          cand_count: "{{ pack.split('###')[4] | int(0) }}"
          plan_count: "{{ pack.split('###')[5] | int(0) }}"
          plan_sum: "{{ pack.split('###')[6] | float(0) }}"
          pozostalo: "{{ pack.split('###')[7] | float(0) }}"
          top_lines: "{{ pack.split('###')[8] }}"
          pv_hours: "{{ pack.split('###')[9] }}"
          min_soc_dynamic_13: "{{ pack.split('###')[10] | int(25) }}"
          cena_aktualna_kwh: "{{ pack.split('###')[11] | float(0) }}"
          battery_can_export_now: "{{ pack.split('###')[12] == 'YES' }}"
          E0_u: "{{ pack.split('###')[13] | float(0) }}"
          E_min_partial: "{{ pack.split('###')[14] | float(0) }}"
          E_reserve_u: "{{ pack.split('###')[15] | float(0) }}"
          calkowite_zuzycie_kwh: "{{ pack.split('###')[16] | float(0) }}"
          calkowite_pv_kwh: "{{ pack.split('###')[17] | float(0) }}"
          energia_z_baterii: "{{ pack.split('###')[18] | float(0) }}"
          spill_pv_min_price_dbg: "{{ pack.split('###')[19] | float(0) }}"
          spill_bat_min_price_dbg: "{{ pack.split('###')[20] | float(0) }}"
          semi_bat_min_price_dbg: "{{ pack.split('###')[21] | float(0) }}"
          full_bat_min_price_dbg: "{{ pack.split('###')[22] | float(0) }}"
          current_mode: "{{ pack.split('###')[23] }}"
          pv_can_export_now: "{{ pack.split('###')[24] == 'YES' }}"
          plan_total_with_sold: "{{ pack.split('###')[25] | float(0) }}"
          battery_budget_spill: "{{ pack.split('###')[26] | float(0) }}"
          battery_budget_semi: "{{ pack.split('###')[27] | float(0) }}"
          battery_budget_full: "{{ pack.split('###')[28] | float(0) }}"
          battery_slot_cap_kwh: "{{ pack.split('###')[29] | float(0) }}"
          current_pv_slot_energy: "{{ pack.split('###')[30] | float(0) }}"
          current_bat_slot_energy: "{{ pack.split('###')[31] | float(0) }}"
          current_plan_energy: "{{ pack.split('###')[32] | float(0) }}"
          current_mode_dbg: "{{ pack.split('###')[33] }}"
          current_price_zone: "{{ pack.split('###')[34] }}"
          current_hour_cons: "{{ pack.split('###')[35] | float(0) }}"
          current_hour_pv: "{{ pack.split('###')[36] | float(0) }}"
          semi_soc_floor_pct: "{{ pack.split('###')[37] | int(50) }}"
          spill_bat_soc_min_pct_dbg: "{{ pack.split('###')[38] | int(30) }}"
          raport_stat: "{{ pack.split('###')[39] }}"
          spill_real_lines: "{{ pack.split('###')[40] }}"
          pv_end_excl: "{{ pack.split('###')[41] | int(14) }}"
          pv_power_5m_w: "{{ pack.split('###')[42] | float(0) }}"
          house_power_5m_w: "{{ pack.split('###')[43] | float(0) }}"
          pv_surplus_min_w: "{{ pack.split('###')[44] | float(0) }}"
          pv_surplus_5m_ok: "{{ pack.split('###')[45] == 'YES' }}"
          soc_stop_full_rano: "{{ pack.split('###')[46] | int(25) }}"
          house_kwh_this_slot_rano: "{{ pack.split('###')[47] | float(0) }}"

      - service: var.set
        data:
          entity_id: var.min_soc_dynamic_13
          value: "{{ soc_stop_full_rano }}"
          attributes:
            last_update: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
            time: "{{ now_hm }}"
            soc_floor_pure: "{{ min_soc_dynamic_13 }}"
            house_kwh_this_slot: "{{ house_kwh_this_slot_rano }}"
            slot: "{{ current_slot_period }}"
            cena_pln_kwh: "{{ cena_aktualna_kwh }}"
            koszt_tansza_pln_kwh: "{{ koszt_tansza }}"
            koszt_drozsza_pln_kwh: "{{ koszt_drozsza }}"
            spill_pv_min_price: "{{ spill_pv_min_price_dbg }}"
            spill_bat_min_price: "{{ spill_bat_min_price_dbg }}"
            semi_bat_min_price: "{{ semi_bat_min_price_dbg }}"
            full_bat_min_price: "{{ full_bat_min_price_dbg }}"
            current_mode: "{{ current_mode }}"
            semi_soc_floor_pct: "{{ semi_soc_floor_pct }}"
            spill_bat_soc_min_pct: "{{ spill_bat_soc_min_pct_dbg }}"
            e0_u: "{{ E0_u }}"
            e_min_partial: "{{ E_min_partial }}"
            e_reserve_u: "{{ E_reserve_u }}"
            calkowite_zuzycie_kwh: "{{ calkowite_zuzycie_kwh }}"
            calkowite_pv_kwh: "{{ calkowite_pv_kwh }}"
            energia_z_baterii: "{{ energia_z_baterii }}"
            pv_hours: "{{ pv_hours }}"
            battery_budget_spill: "{{ battery_budget_spill }}"
            battery_budget_semi: "{{ battery_budget_semi }}"
            battery_budget_full: "{{ battery_budget_full }}"
            battery_slot_cap_kwh: "{{ battery_slot_cap_kwh }}"
            current_pv_slot_energy: "{{ current_pv_slot_energy }}"
            current_bat_slot_energy: "{{ current_bat_slot_energy }}"
            current_plan_energy: "{{ current_plan_energy }}"
            current_mode_dbg: "{{ current_mode_dbg }}"
            current_price_zone: "{{ current_price_zone }}"
            current_hour_cons: "{{ current_hour_cons }}"
            current_hour_pv: "{{ current_hour_pv }}"
            pv_power_5m_w: "{{ pv_power_5m_w }}"
            house_power_5m_w: "{{ house_power_5m_w }}"
            pv_surplus_min_w: "{{ pv_surplus_min_w }}"
            pv_surplus_5m_ok: "{{ pv_surplus_5m_ok }}"

      - service: var.set
        data:
          entity_id: var.spill_poranny
          value: "{{ pozostalo }}"
          attributes:
            last_update: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
            time: "{{ now_hm }}"
            prev_left_kwh: "{{ spill_left_prev | round(3) }}"
            current_left_kwh: "{{ pozostalo | round(3) }}"
            energy_sold_kwh: "{{ energy_sold | round(3) }}"
            plan_sum_kwh: "{{ plan_sum | round(3) }}"
            plan_total_with_sold_kwh: "{{ plan_total_with_sold | round(3) }}"
            plan_count: "{{ plan_count }}"
            cand_count: "{{ cand_count }}"
            current_slot: "{{ current_slot_period }}"
            current_mode: "{{ current_mode }}"
            current_mode_dbg: "{{ current_mode_dbg }}"
            in_plan_now: "{{ in_plan_now }}"
            pv_can_export_now: "{{ pv_can_export_now }}"
            battery_can_export_now: "{{ battery_can_export_now }}"
            soc_current: "{{ soc_current | round(1) }}"
            min_soc_dynamic_13: "{{ min_soc_dynamic_13 }}"
            semi_soc_floor_pct: "{{ semi_soc_floor_pct }}"
            spill_bat_soc_min_pct: "{{ spill_bat_soc_min_pct_dbg }}"
            cena_aktualna_pln_kwh: "{{ cena_aktualna_kwh | round(4) }}"
            pv_hours: "{{ pv_hours }}"
            top_lines: "{{ top_lines }}"
            raport: "{{ raport_stat }}"
            spill_real_lines: "{{ spill_real_lines }}"
            pv_power_5m_w: "{{ pv_power_5m_w }}"
            house_power_5m_w: "{{ house_power_5m_w }}"
            pv_surplus_min_w: "{{ pv_surplus_min_w }}"
            pv_surplus_5m_ok: "{{ pv_surplus_5m_ok }}"

      - service: script.ems_notify
        data:
          title: "📊 Plan porannego eksportu"
          message: >
            🎯 Fizyczny spill od teraz do końca produkcji ({{ '%02d:00' | format(pv_end_excl) }}): {{ pozostalo | round(2) }} kWh

            📈 Plan:
            - Slotów: {{ plan_count }}
            - Energia już oddana: {{ energy_sold | round(2) }} kWh
            - Planowana energia eksportu: {{ plan_sum | round(2) }} kWh
            - Razem (oddane + plan eksportu): {{ plan_total_with_sold | round(2) }} kWh
            - Dane PV: {{ pv_hours }}

            🔋 SOC: {{ soc_current | round(1) }}%
            🛡️ SOC stop FULL (floor+rezerwa godz.): {{ soc_stop_full_rano }}%
            🛡️ Min SOC do 13:00 (floor): {{ min_soc_dynamic_13 }}%
            🏠 Zużycie domu ten slot: {{ house_kwh_this_slot_rano | round(3) }} kWh
            🛡️ Min SOC rano (do 13:00): {{ soc_min_rano_pct }}%
            🛡️ Semi floor na 13:00: {{ semi_soc_floor_pct }}%
            🛡️ Spill BAT floor: {{ spill_bat_soc_min_pct_dbg }}%
            🔋 Budżet BAT spill: {{ battery_budget_spill | round(2) }} kWh
            🔋 Budżet BAT semi: {{ battery_budget_semi | round(2) }} kWh
            🔋 Budżet BAT full: {{ battery_budget_full | round(2) }} kWh
            🔋 Limit BAT / slot: {{ battery_slot_cap_kwh | round(2) }} kWh
            💰 Próg PV spill: {{ spill_pv_min_price_dbg | round(3) }} PLN/kWh
            💰 Próg BAT spill: {{ spill_bat_min_price_dbg | round(3) }} PLN/kWh
            💰 Próg BAT semi: {{ semi_bat_min_price_dbg | round(3) }} PLN/kWh
            💰 Próg BAT full: {{ full_bat_min_price_dbg | round(3) }} PLN/kWh

            🔎 Bieżący slot:
            - Slot: {{ current_slot_period }}
            - Mode: {{ current_mode_dbg }}
            - Strefa ceny: {{ current_price_zone }}
            - PV slot: {{ current_pv_slot_energy | round(3) }} kWh
            - BAT slot: {{ current_bat_slot_energy | round(3) }} kWh
            - Plan slot: {{ current_plan_energy | round(3) }} kWh
            - Zużycie godziny: {{ current_hour_cons | round(3) }} kWh
            - PV godziny: {{ current_hour_pv | round(3) }} kWh
            - Śr. moc PV 5 min: {{ pv_power_5m_w | round(0) }} W
            - Śr. pobór domu 5 min: {{ house_power_5m_w | round(0) }} W
            - Min PV do eksportu: {{ pv_surplus_min_w | round(0) }} W
            - Nadwyżka PV 5 min OK: {{ 'TAK' if pv_surplus_5m_ok else 'NIE' }}

            💰 Sloty planowanego eksportu:{{ top_lines }}

            🌊 Godziny realnego spillu:
            {{ spill_real_lines if spill_real_lines | length > 0 else '\n- brak' }}

            🔍 Statystyki:
            {{ raport_stat }}

      - service: system_log.write
        data:
          level: warning
          message: >
            PORANEK_V13_1 {{ now_hm }}
            | slot="{{ current_slot_period }}" price={{ cena_aktualna }} mwh / {{ cena_aktualna_kwh }} kWh
            | spill_prev={{ spill_left_prev | round(2) }} spill_now={{ pozostalo | round(2) }}
            | sold={{ energy_sold | round(2) }} plan_sum={{ plan_sum | round(2) }} total_with_sold={{ plan_total_with_sold | round(2) }}
            | SOC={{ soc_current | round(1) }}% min13={{ min_soc_dynamic_13 }}% semi13={{ semi_soc_floor_pct }}% spill30={{ spill_bat_soc_min_pct_dbg }}%
            | mode={{ current_mode }}
            | cand={{ cand_count }} plan={{ plan_count }}
            | pv_hours={{ pv_hours }}
            | E0={{ E0_u }} E_min={{ E_min_partial }} E_reserve={{ E_reserve_u }}
            | cons={{ calkowite_zuzycie_kwh }} pv={{ calkowite_pv_kwh }} batt_need={{ energia_z_baterii }}
            | spill_pv={{ spill_pv_min_price_dbg }} spill_bat={{ spill_bat_min_price_dbg }} semi_bat={{ semi_bat_min_price_dbg }} full_bat={{ full_bat_min_price_dbg }}
            | batt_budget_spill={{ battery_budget_spill }} batt_budget_semi={{ battery_budget_semi }} batt_budget_full={{ battery_budget_full }} slot_cap={{ battery_slot_cap_kwh }}
            | current_mode_dbg={{ current_mode_dbg }} current_zone={{ current_price_zone }}
            | current_pv_slot={{ current_pv_slot_energy }} current_bat_slot={{ current_bat_slot_energy }} current_plan={{ current_plan_energy }}
            | hour_cons={{ current_hour_cons }} hour_pv={{ current_hour_pv }}
            | pv_5m={{ pv_power_5m_w }}W house_5m={{ house_power_5m_w }}W pv_min={{ pv_surplus_min_w }}W pv_surplus_ok={{ 'YES' if pv_surplus_5m_ok else 'NO' }}
            | pv_can={{ 'YES' if pv_can_export_now else 'NO' }}
            | batt_can={{ 'YES' if battery_can_export_now else 'NO' }}
            | in_plan={{ 'YES' if in_plan_now else 'NO' }}
            | spill_real={{ spill_real_lines }}
            | raport={{ raport_stat }}

      - choose:
          - conditions:
              - condition: template
                value_template: "{{ pozostalo <= 0.01 and plan_sum <= 0.01 }}"
            sequence:
              - service: input_boolean.turn_off
                target:
                  entity_id: input_boolean.pv_discharge_to_grid
              - delay: "00:00:03"
              - service: input_boolean.turn_off
                target:
                  entity_id: input_boolean.battery_discharge_to_grid

          - conditions:
              - condition: template
                value_template: "{{ cena_aktualna <= 0 }}"
            sequence:
              - service: input_boolean.turn_off
                target:
                  entity_id: input_boolean.pv_discharge_to_grid
              - delay: "00:00:03"
              - service: input_boolean.turn_off
                target:
                  entity_id: input_boolean.battery_discharge_to_grid

          - conditions:
              - condition: template
                value_template: "{{ pv_hours.split('|')[0].split('/')[1].strip() | int(0) == 0 }}"
            sequence:
              - service: input_boolean.turn_off
                target:
                  entity_id: input_boolean.pv_discharge_to_grid
              - delay: "00:00:03"
              - service: input_boolean.turn_off
                target:
                  entity_id: input_boolean.battery_discharge_to_grid
              - service: script.ems_notify
                data:
                  title: "⚠️ STOP eksportu - brak danych PV"
                  message: >
                    {{ now_hm }} | Brak prognozy PV ({{ pv_hours }})

          - conditions:
              - condition: template
                value_template: "{{ soc_current < soc_comfort_pct }}"
            sequence:
              - service: input_boolean.turn_off
                target:
                  entity_id: input_boolean.pv_discharge_to_grid
              - delay: "00:00:03"
              - service: input_boolean.turn_off
                target:
                  entity_id: input_boolean.battery_discharge_to_grid

          - conditions:
              - condition: template
                value_template: "{{ in_plan_now and current_mode in ['pv_only'] and not pv_can_export_now }}"
            sequence:
              - service: input_boolean.turn_off
                target:
                  entity_id: input_boolean.pv_discharge_to_grid
              - delay: "00:00:03"
              - service: input_boolean.turn_off
                target:
                  entity_id: input_boolean.battery_discharge_to_grid

          - conditions:
              - condition: template
                value_template: "{{ in_plan_now and current_plan_energy > 0 }}"
            sequence:
              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ battery_can_export_now }}"
                    sequence:
                      - service: input_boolean.turn_off
                        target:
                          entity_id: input_boolean.pv_discharge_to_grid
                      - delay: "00:00:03"
                      - service: input_boolean.turn_on
                        target:
                          entity_id: input_boolean.battery_discharge_to_grid
                      - choose:
                          - conditions:
                              - condition: template
                                value_template: "{{ not was_battery_discharging }}"
                            sequence:
                              - service: script.ems_notify
                                data:
                                  title: "🚀 START eksportu z magazynu"
                                  message: >
                                    {{ now_hm }} | Slot {{ current_slot_period }}
                                    | Cena: {{ cena_aktualna_kwh | round(3) }} PLN/kWh
                                    | Mode: {{ current_mode }}
                                    | Strefa ceny: {{ current_price_zone }}
                                    | PV slot: {{ current_pv_slot_energy | round(3) }} kWh
                                    | BAT slot: {{ current_bat_slot_energy | round(3) }} kWh
                                    | Plan slot: {{ current_plan_energy | round(3) }} kWh
                                    | SOC: {{ soc_current | round(1) }}%
                                    | Min SOC do 13:00: {{ min_soc_dynamic_13 }}%
                                    | Semi floor: {{ semi_soc_floor_pct }}%
                                    | Spill BAT floor: {{ spill_bat_soc_min_pct_dbg }}%
                default:
                  - service: input_boolean.turn_off
                    target:
                      entity_id: input_boolean.battery_discharge_to_grid
                  - delay: "00:00:03"
                  - service: input_boolean.turn_on
                    target:
                      entity_id: input_boolean.pv_discharge_to_grid
                  - choose:
                      - conditions:
                          - condition: template
                            value_template: "{{ was_battery_discharging or not was_pv_discharging }}"
                        sequence:
                          - service: script.ems_notify
                            data:
                              title: "🔄 Tryb PV-only"
                              message: >
                                {{ now_hm }} | Slot {{ current_slot_period }}
                                | Cena: {{ cena_aktualna_kwh | round(3) }} PLN/kWh
                                | Mode: {{ current_mode }}
                                | Strefa ceny: {{ current_price_zone }}
                                | PV slot: {{ current_pv_slot_energy | round(3) }} kWh
                                | BAT slot: {{ current_bat_slot_energy | round(3) }} kWh
                                | Plan slot: {{ current_plan_energy | round(3) }} kWh
                                | SOC: {{ soc_current | round(1) }}%
                                | Min SOC do 13:00: {{ min_soc_dynamic_13 }}%
                                | Semi floor: {{ semi_soc_floor_pct }}%
                                | Spill BAT floor: {{ spill_bat_soc_min_pct_dbg }}%
        default:
          - service: input_boolean.turn_off
            target:
              entity_id: input_boolean.pv_discharge_to_grid
          - delay: "00:00:03"
          - service: input_boolean.turn_off
            target:
              entity_id: input_boolean.battery_discharge_to_grid

      - choose:
          - conditions:
              - condition: template
                value_template: "{{ now_hm == '13:00' }}"
            sequence:
              - service: script.ems_notify
                data:
                  title: "📈 Podsumowanie porannego eksportu"
                  message: >
                    🔄 Fizyczny spill od teraz do końca produkcji ({{ '%02d:00' | format(pv_end_excl) }}): {{ pozostalo | round(2) }} kWh
                    ✅ Sprzedano: {{ energy_sold | round(2) }} kWh
                    📦 Plan eksportu: {{ plan_sum | round(2) }} kWh
                    🔋 SOC końcowy: {{ soc_current | round(1) }}%
                    🛡️ Min SOC do 13:00: {{ min_soc_dynamic_13 }}%
                    🛡️ Semi floor: {{ semi_soc_floor_pct }}%
                    🛡️ Spill BAT floor: {{ spill_bat_soc_min_pct_dbg }}%
                    💰 Wykorzystano {{ plan_count }} slotów




###############################################################################
# STOP ODDAWANIA SPILLU PORANNEGO DO SIECI (06:00–13:00)
###############################################################################


  - alias: "Magazyn: Strażnik SOC porannego eksportu -> BAT stop wg bufora i ceny"
    id: magazyn_straznik_soc_poranny_eksport_bufor_cena_v10_1
    mode: single
    description: >
      Twardy stop BAT przy SOC <= min_soc_dynamic_13.
      Miękki stop BAT przy SOC <= min_soc_dynamic_13 + 5,
      ale tylko jeśli cena < koszt_drozsza.

    trigger:
      - platform: state
        entity_id: sensor.solarman_battery_safe

    condition:
      - condition: time
        after: "06:00:00"
        before: "13:00:00"

      - condition: state
        entity_id: input_boolean.battery_discharge_to_grid
        state: "on"

    action:
      - variables:
          soc_now: "{{ states('sensor.solarman_battery_safe') | float(0) }}"
          soc_min: "{{ states('var.min_soc_dynamic_13') | float(25) }}"
          soc_min_buffer: "{{ (states('var.min_soc_dynamic_13') | float(25)) + 5 }}"
          koszt_drozsza: "{{ states('var.magazyn_koszt_calkowity_strefa_drozsza_pln_kwh') | float(0) }}"
          ceny_data: "{{ state_attr('sensor.rce_prices_today_scaled', 'value') or [] }}"
          slot_start_total: "{{ now().hour * 60 + ((now().minute // 15) * 15) }}"

          pack_price: >-
            {% set ns = namespace(price_mwh=0.0, period='') %}
            {% for c in ceny_data %}
              {% if c is mapping and c.period is defined %}
                {% set p = (c.period | string).replace('–','-') %}
                {% set p2 = p.replace(' ', '') %}
                {% if '-' in p2 %}
                  {% set parts = p2.split('-') %}
                  {% set s = parts[0].split(':') %}
                  {% set e = parts[1].split(':') %}
                  {% if s|length == 2 and e|length == 2 %}
                    {% set st = (s[0]|int)*60 + (s[1]|int) %}
                    {% set et = (e[0]|int)*60 + (e[1]|int) %}
                    {% if (slot_start_total | int) >= st and (slot_start_total | int) < et %}
                      {% set ns.price_mwh = c.rce_pln | float(0) %}
                      {% set ns.period = c.period %}
                    {% endif %}
                  {% endif %}
                {% endif %}
              {% endif %}
            {% endfor %}
            {{ ns.period }}###{{ (ns.price_mwh / 1000) | round(4) }}

      - variables:
          current_slot_period: "{{ pack_price.split('###')[0] }}"
          cena_aktualna_kwh: "{{ pack_price.split('###')[1] | float(0) }}"

      - choose:
          - conditions:
              - condition: template
                value_template: "{{ soc_now <= soc_min }}"
            sequence:
              - service: input_boolean.turn_off
                target:
                  entity_id: input_boolean.battery_discharge_to_grid
              - delay: "00:00:03"
              - service: input_boolean.turn_on
                target:
                  entity_id: input_boolean.pv_discharge_to_grid
              - service: script.ems_notify
                data:
                  title: "🛡️ Strażnik SOC: twardy stop BAT"
                  message: >
                    {{ now().strftime('%H:%M') }}
                    | Slot: {{ current_slot_period }}
                    | SOC: {{ soc_now | round(1) }}%
                    | Min dynamiczny do 13:00: {{ soc_min | round(0) }}%
                    | Cena: {{ cena_aktualna_kwh | round(3) }} PLN/kWh

          - conditions:
              - condition: template
                value_template: >
                  {{ soc_now <= soc_min_buffer and soc_now > soc_min
                     and cena_aktualna_kwh < koszt_drozsza }}
            sequence:
              - service: input_boolean.turn_off
                target:
                  entity_id: input_boolean.battery_discharge_to_grid
              - delay: "00:00:03"
              - service: input_boolean.turn_on
                target:
                  entity_id: input_boolean.pv_discharge_to_grid
              - service: script.ems_notify
                data:
                  title: "🛡️ Strażnik SOC: stop BAT na buforze"
                  message: >
                    {{ now().strftime('%H:%M') }}
                    | Slot: {{ current_slot_period }}
                    | SOC: {{ soc_now | round(1) }}%
                    | Min dynamiczny: {{ soc_min | round(0) }}%
                    | Bufor stop: {{ soc_min_buffer | round(0) }}%
                    | Cena: {{ cena_aktualna_kwh | round(3) }} PLN/kWh
                    | Próg droższej strefy: {{ koszt_drozsza | round(3) }} PLN/kWh

        default: []

  - alias: "Magazyn: Strażnik PV porannego eksportu -> stop przy braku nadwyżki 5 min"
    id: magazyn_straznik_pv_poranny_eksport_stop_nadwyzka_5m_v1
    mode: restart
    description: >
      W trakcie porannego eksportu PV wyłącz eksport, jeśli średnia moc PV z 5 minut
      spadnie poniżej 125% średniego poboru domu z 5 minut.

    trigger:
      - platform: state
        entity_id:
          - sensor.srednia_moc_z_pv_5_minut
          - sensor.srednia_moc_pobierana_przez_dom_2_5_minut

    condition:
      - condition: time
        after: "06:00:00"
        before: "13:00:00"

      - condition: state
        entity_id: input_boolean.pv_discharge_to_grid
        state: "on"

    action:
      - variables:
          pv_power_5m_w: "{{ states('sensor.srednia_moc_z_pv_5_minut') | float(0) }}"
          house_power_5m_w: "{{ states('sensor.srednia_moc_pobierana_przez_dom_2_5_minut') | float(0) }}"
          current_slot_period: "{{ state_attr('var.spill_poranny', 'current_slot') | default('', true) }}"
          in_plan_now: "{{ state_attr('var.spill_poranny', 'in_plan_now') in [true, 'True', 'true', 'on', 'ON'] }}"
          current_mode_dbg: "{{ state_attr('var.spill_poranny', 'current_mode_dbg') | default('', true) }}"

      - variables:
          house_power_5m_w: "{{ [house_power_5m_w, 0] | max }}"
          pv_surplus_min_w: "{{ house_power_5m_w * 1.25 }}"
          pv_surplus_5m_ok: "{{ pv_power_5m_w >= pv_surplus_min_w }}"

      - choose:
          - conditions:
              - condition: template
                value_template: "{{ in_plan_now and not pv_surplus_5m_ok }}"
            sequence:
              - service: input_boolean.turn_off
                target:
                  entity_id: input_boolean.pv_discharge_to_grid
              - service: script.ems_notify
                data:
                  title: "⏹️ STOP eksportu PV - brak nadwyżki 5 min"
                  message: >
                    {{ now().strftime('%H:%M') }}
                    | Slot: {{ current_slot_period if current_slot_period | length > 0 else 'brak' }}
                    | Mode: {{ current_mode_dbg if current_mode_dbg | length > 0 else 'pv_only' }}
                    | Śr. moc PV 5 min: {{ pv_power_5m_w | round(0) }} W
                    | Śr. pobór domu 5 min: {{ house_power_5m_w | round(0) }} W
                    | Min PV do eksportu: {{ pv_surplus_min_w | round(0) }} W
              - service: system_log.write
                data:
                  level: warning
                  message: >
                    PORANEK_PV_GUARD {{ now().strftime('%H:%M') }}
                    | slot="{{ current_slot_period }}"
                    | mode={{ current_mode_dbg }}
                    | pv_5m={{ pv_power_5m_w }}W
                    | house_5m={{ house_power_5m_w }}W
                    | pv_min={{ pv_surplus_min_w }}W
                    | in_plan={{ 'YES' if in_plan_now else 'NO' }}

        default: []






