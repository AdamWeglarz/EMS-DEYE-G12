        at: "21:30:00"
      - platform: time
        at: "21:45:00"
  
    action:
      - variables:
          tz_to: "{{ now().strftime('%z')[0:3] ~ ':' ~ now().strftime('%z')[3:5] }}"
          dzis: "{{ now().date() }}"
          h_now: "{{ now().hour }}"
          m_now: "{{ now().minute }}"
          t_now: "{{ now().strftime('%H:%M') }}"
          was_discharging: "{{ is_state('input_boolean.battery_discharge_to_grid', 'on') }}"
  
          # Koszty / progi
          koszt_drozsza: "{{ states('var.magazyn_koszt_calkowity_strefa_drozsza_pln_kwh') | float(0) }}"
          koszt_tansza: "{{ states('var.magazyn_koszt_calkowity_strefa_tansza_pln_kwh') | float(0) }}"
          min_zysk_sprzedaz: "{{ states('var.magazyn_min_zysk_sprzedaz_pln_kwh') | float(0) }}"
          prog_czesciowy: >
            {{ (states('var.magazyn_koszt_calkowity_strefa_tansza_pln_kwh') | float(0))
               + (states('var.magazyn_min_zysk_sprzedaz_pln_kwh') | float(0)) }}
          prog_pelny: >
            {{ (states('var.magazyn_koszt_calkowity_strefa_drozsza_pln_kwh') | float(0))
               + (states('var.magazyn_min_zysk_sprzedaz_pln_kwh') | float(0)) }}
  
          # Bateria
          soc_now: "{{ states('sensor.solarman_battery_safe') | float(0) }}"
          pojemnosc_kwh: "{{ states('var.magazyn_pojemnosc_brutto_kwh') | float(15) }}"
          soc_floor_pct: "{{ states('var.magazyn_soc_floor_percent') | float(20) }}"
          soc_comfort_pct: "{{ states('var.magazyn_soc_comfort_percent') | float(25) }}"
          max_moc_rozladowania_kw: "{{ states('var.magazyn_max_moc_rozladowania_kw') | float(6) }}"
  
          # Zużycie
          cons_mult: "{{ states('var.magazyn_konsumpcja_multiplier') | float(1.15) }}"
          cons_default: "{{ states('var.magazyn_konsumpcja_default_kwh_h') | float(1.5) }}"
          urlop_kwh_h: "{{ states('var.magazyn_konsumpcja_urlop_kwh_h') | float(0.5) }}"
          sprzatanie_mult: "{{ states('var.magazyn_konsumpcja_mult_sprzatanie') | float(2.0) }}"
          lookback_sec: "{{ (states('var.magazyn_sql_lookback_days_ladowanie') | int(7)) * 86400 }}"

          # Dane
          ceny_data: "{{ state_attr('sensor.rce_prices_today_scaled', 'value') or [] }}"
  
      - service: sql.query
        data:
          query: >
            SELECT
              HOUR(CONVERT_TZ(FROM_UNIXTIME(s.last_updated_ts), '+00:00', '{{ tz_to }}')) AS h,
              AVG(CAST(s.state AS DECIMAL(10,3))) AS avg_h
            FROM states s
            JOIN states_meta m ON s.metadata_id = m.metadata_id
            WHERE m.entity_id = 'sensor.srednie_zuzycie_o_obecnej_godzinie'
              AND s.state NOT IN ('unknown', 'unavailable', '')
              AND s.last_updated_ts > (UNIX_TIMESTAMP(NOW()) - {{ lookback_sec }})
              AND HOUR(CONVERT_TZ(FROM_UNIXTIME(s.last_updated_ts), '+00:00', '{{ tz_to }}')) BETWEEN {{ h_now }} AND 21
            GROUP BY h
            ORDER BY h;
        response_variable: statystyki_wieczor

      - service: calendar.get_events
        target:
          entity_id: calendar.urlop
        data:
          start_date_time: "{{ now().strftime('%Y-%m-%d 00:00:00') }}"
          end_date_time: "{{ now().strftime('%Y-%m-%d 23:59:59') }}"
        response_variable: urlop_events

      - service: calendar.get_events
        target:
          entity_id: calendar.sprzatanie
        data:
          start_date_time: "{{ now().strftime('%Y-%m-%d 00:00:00') }}"
          end_date_time: "{{ now().strftime('%Y-%m-%d 23:59:59') }}"
        response_variable: sprzatanie_events

      - variables:
          pack: >-
            {% set slot_start_min = (m_now // 15) * 15 %}
            {% set slot_start_total = (h_now * 60 + slot_start_min) %}
            {% set dzis = now().date() %}
            {% set plan_date = dzis %}

            {# ===== URLOP: lista godzin dla dzisiejszego planu ===== #}
            {% set urlop_list = (urlop_events['calendar.urlop'].events if (urlop_events and 'calendar.urlop' in urlop_events) else []) %}
            {% set urlop_ns = namespace(hours=[]) %}
            {% for ev in urlop_list %}
              {% set es = as_datetime(ev.start) | as_local %}
              {% set ee = as_datetime(ev.end) | as_local %}
              {% for off in range(0, 24) %}
                {% set probe = now().replace(hour=0, minute=30, second=0, microsecond=0) + timedelta(hours=off) %}
                {% if probe >= es and probe < ee %}
                  {% set hk = probe.strftime('%Y-%m-%d %H') %}
                  {% if hk not in urlop_ns.hours %}
                    {% set urlop_ns.hours = urlop_ns.hours + [hk] %}
                  {% endif %}
                {% endif %}
              {% endfor %}
            {% endfor %}
            {% set urlop_hours = urlop_ns.hours %}

            {# ===== SPRZATANIE: lista godzin dla dzisiejszego planu ===== #}
            {% set sprzatanie_list = (sprzatanie_events['calendar.sprzatanie'].events if (sprzatanie_events and 'calendar.sprzatanie' in sprzatanie_events) else []) %}
            {% set sprzatanie_ns = namespace(hours=[]) %}
            {% for ev in sprzatanie_list %}
              {% set es = as_datetime(ev.start) | as_local %}
              {% set ee = as_datetime(ev.end) | as_local %}
              {% for off in range(0, 24) %}
                {% set probe = now().replace(hour=0, minute=30, second=0, microsecond=0) + timedelta(hours=off) %}
                {% if probe >= es and probe < ee %}
                  {% set hk = probe.strftime('%Y-%m-%d %H') %}
                  {% if hk not in sprzatanie_ns.hours %}
                    {% set sprzatanie_ns.hours = sprzatanie_ns.hours + [hk] %}
                  {% endif %}
                {% endif %}
              {% endfor %}
            {% endfor %}
            {% set sprzatanie_hours = sprzatanie_ns.hours %}

            {# --- aktualny slot i cena --- #}
            {% set nsS = namespace(period='', price_mwh=0.0) %}
            {% for c in ceny_data %}
              {% if c is mapping and c.period is defined %}
                {% set p = (c.period | string).replace('–', '-') %}
                {% set p2 = p.replace(' ', '') %}
                {% if '-' in p2 %}
                  {% set parts = p2.split('-') %}
                  {% set s = parts[0].split(':') %}
                  {% set e = parts[1].split(':') %}
                  {% if s | length == 2 and e | length == 2 %}
                    {% set st = (s[0] | int) * 60 + (s[1] | int) %}
                    {% set et = (e[0] | int) * 60 + (e[1] | int) %}
                    {% if slot_start_total >= st and slot_start_total < et %}
                      {% set nsS.period = c.period %}
                      {% set nsS.price_mwh = c.rce_pln | float(0) %}
                    {% endif %}
                  {% endif %}
                {% endif %}
              {% endif %}
            {% endfor %}
            {% set current_slot_period = nsS.period %}
            {% set cena_kwh = (nsS.price_mwh | float(0)) / 1000 %}
  
            {# --- zużycie dict --- #}
            {% set rows = statystyki_wieczor['result'] if (statystyki_wieczor is mapping and 'result' in statystyki_wieczor) else [] %}
            {% set nsC = namespace(d={}) %}
            {% for row in rows %}
              {% set nsC.d = nsC.d | combine({ (row['h'] | int): (row['avg_h'] | float(0)) }) %}
            {% endfor %}
            {% set dict_z = nsC.d %}
  
            {# --- PV dict 15-22: preferuj hourly, fallback do detailedForecast --- #}
            {% set hourly_list = state_attr('sensor.solcast_pv_forecast_prognoza_na_dzisiaj', 'detailedHourly') or [] %}
            {% set halfhour_list = state_attr('sensor.solcast_pv_forecast_prognoza_na_dzisiaj', 'detailedForecast') or [] %}
            {% set forecast_data = hourly_list if (hourly_list | count) > 0 else halfhour_list %}
            {% set forecast_source = 'detailedHourly' if (hourly_list | count) > 0 else 'detailedForecast' %}
  
            {% set nsP = namespace(d={}) %}
            {% if forecast_data is iterable %}
              {% for item in forecast_data %}
                {% if item is mapping %}
                  {% set ps = item.get('period_start', item.get('datetime', '')) | string %}
                  {% if ps | length >= 13 %}
                    {% set ts_date = ps[0:10] %}
                    {% set ts_hour = ps[11:13] | int(-1) %}
                    {% if ts_date == (dzis | string) and ts_hour >= 15 and ts_hour < 22 %}
                      {% set pv_value = item.get('pv_estimate', item.get('pv_forecast', 0)) | float(0) %}
                      {% set prev = nsP.d.get(ts_hour, 0) | float(0) %}
                      {% set nsP.d = nsP.d | combine({ ts_hour: (prev + pv_value) }) %}
                    {% endif %}
                  {% endif %}
                {% endif %}
              {% endfor %}
            {% endif %}
            {% set pv_d = nsP.d %}
            {% set pv_count = pv_d | length %}
            {% set pv_hours_debug =
              'src=' ~ forecast_source ~
              ' | hourly_len=' ~ (hourly_list | list | count) ~
              ' | half_len=' ~ (halfhour_list | list | count) ~
              ' | pv_count=' ~ pv_count ~
              ' | dzis=' ~ dzis ~
              ' | pv_d=' ~ pv_d %}
  
            {# --- energia użyteczna teraz --- #}
            {% set floor_kwh = pojemnosc_kwh * soc_floor_pct / 100 %}
            {% set max_u = pojemnosc_kwh - floor_kwh %}
            {% set E0_u = (soc_now / 100) * pojemnosc_kwh - floor_kwh %}
            {% if E0_u < 0 %}
              {% set E0_u = 0 %}
            {% endif %}
            {% if E0_u > max_u %}
              {% set E0_u = max_u %}
            {% endif %}
  
            {% set E_reserve_u = (pojemnosc_kwh * soc_comfort_pct / 100) - floor_kwh %}
            {% if E_reserve_u < 0 %}
              {% set E_reserve_u = 0 %}
            {% endif %}
            {% if E_reserve_u > max_u %}
              {% set E_reserve_u = max_u %}
            {% endif %}
  
            {# --- zapotrzebowanie domu od teraz do 22:00 --- #}
            {% set current_hour_factor = ((60 - m_now) / 60) | float(0) %}
  
            {% set ns_cons = namespace(total=0.0) %}
            {% for h in range(h_now, 22) %}
              {% set hk = plan_date.strftime('%Y-%m-%d') ~ ' ' ~ '%02d'|format(h) %}
              {% set is_urlop_h = hk in urlop_hours %}
              {% set is_sprzatanie_h = hk in sprzatanie_hours %}
              {% set z_h = (dict_z.get(h, cons_default)) * sprzatanie_mult if is_sprzatanie_h else (urlop_kwh_h if is_urlop_h else (dict_z.get(h, cons_default)) * cons_mult) %}
              {% set factor = current_hour_factor if h == h_now else 1 %}
              {% set ns_cons.total = ns_cons.total + (z_h * factor) %}
            {% endfor %}
            {% set calkowite_zuzycie_kwh = ns_cons.total %}
  
            {% set ns_pv_sum = namespace(total=0.0) %}
            {% for h in range(h_now, 22) %}
              {% set pv_h = pv_d.get(h, 0) %}
              {% set factor = current_hour_factor if h == h_now else 1 %}
              {% set ns_pv_sum.total = ns_pv_sum.total + (pv_h * factor) %}
            {% endfor %}
            {% set calkowite_pv_kwh = ns_pv_sum.total %}
  
            {% set energia_dom_z_baterii_do_22 = calkowite_zuzycie_kwh - calkowite_pv_kwh %}
            {% if energia_dom_z_baterii_do_22 < 0 %}
              {% set energia_dom_z_baterii_do_22 = 0 %}
            {% endif %}
  
            {# --- partial baseline: realnie dostępny budżet (informacyjnie) --- #}
            {% set E_required_partial = energia_dom_z_baterii_do_22 + E_reserve_u %}
            {% set sellable_partial_baseline = E0_u - E_required_partial %}
            {% if sellable_partial_baseline < 0 %}
              {% set sellable_partial_baseline = 0 %}
            {% endif %}

            {# --- full: można zejść do floor, bez patrzenia na przetrwanie do 22:00 --- #}
            {% set sellable_full_now = E0_u %}
            {% if sellable_full_now < 0 %}
              {% set sellable_full_now = 0 %}
            {% endif %}

            {# --- Bilansowanie godzinne 1/2: NIETYKALNY bufor do końca bieżącej godziny ---
                 Prawo: rozliczanie jest godzinne (netting w oknie 60 min).
                 Nie oddajemy z baterii tego, czego będziemy potrzebować do końca bieżącej
                 godziny rozliczeniowej — bo import w tej samej godzinie anuluje eksport.

                 Budżet eksportu = E0_u - zużycie_bieżącego_slotu - reserve_po_slocie
                 Przykład: mamy 0.5 kWh, dom zużyje 0.3 kWh w tym slocie, reserve=0
                 → eksportujemy tylko 0.2 kWh i stopujemy.

                 SOC stop = floor + reserve_po_slocie
                 (po zakończeniu slotu zostaje dokładnie tyle ile potrzebne na resztę godziny) #}
            {% set slot_end_min = slot_start_min + 15 %}
            {% set mins_rest_of_hour = 60 - slot_end_min %}
            {% set z_h_eoh = dict_z.get(h_now, cons_default) * cons_mult %}
            {% set pv_h_eoh = pv_d.get(h_now, 0) %}
            {% set house_kwh_this_slot = [z_h_eoh * 15 / 60 - pv_h_eoh * 15 / 60, 0] | max %}
            {% set reserve_do_konca_godziny_kwh = [z_h_eoh * mins_rest_of_hour / 60 - pv_h_eoh * mins_rest_of_hour / 60, 0] | max %}
            {% set sellable_full_now = [sellable_full_now - reserve_do_konca_godziny_kwh - house_kwh_this_slot, 0] | max %}
  
            {% set battery_slot_u_full = max_moc_rozladowania_kw * 0.25 %}
            {% if battery_slot_u_full < 0 %}
              {% set battery_slot_u_full = 0 %}
            {% endif %}
  
            {# --- kandydaci --- #}
            {% set ns = namespace(full=[], partial=[]) %}
            {% for c in ceny_data %}
              {% if c is mapping and c.period is defined %}
                {% set p = (c.period | string).replace('–', '-') %}
                {% set p2 = p.replace(' ', '') %}
                {% if '-' in p2 %}
                  {% set parts = p2.split('-') %}
                  {% set start = parts[0] %}
                  {% set hm = start.split(':') %}
                  {% if hm | length == 2 %}
                    {% set h = hm[0] | int %}
                    {% set m = hm[1] | int %}
                    {% set st = h * 60 + m %}
                    {% set price_kwh = (c.rce_pln | float(0)) / 1000 %}
                    {% if h >= 15 and h < 22 and st >= slot_start_total and price_kwh >= prog_czesciowy %}
                      {% set pv_h = pv_d.get(h, 0) %}
                      {% set hk = plan_date.strftime('%Y-%m-%d') ~ ' ' ~ '%02d'|format(h) %}
              {% set is_urlop_h = hk in urlop_hours %}
              {% set is_sprzatanie_h = hk in sprzatanie_hours %}
              {% set z_h = (dict_z.get(h, cons_default)) * sprzatanie_mult if is_sprzatanie_h else (urlop_kwh_h if is_urlop_h else (dict_z.get(h, cons_default)) * cons_mult) %}
                      {% set base_delta_slot = (pv_h - z_h) / 4 %}
                      {% if price_kwh >= prog_pelny %}
                        {% set ns.full = ns.full + [{
                          'period': c.period,
                          'price_mwh': (c.rce_pln | float(0)),
                          'price_kwh': price_kwh,
                          'base_delta': base_delta_slot,
                          'batt_cap': battery_slot_u_full,
                          'mode': 'full'
                        }] %}
                      {% else %}
                        {% set ns.partial = ns.partial + [{
                          'period': c.period,
                          'price_mwh': (c.rce_pln | float(0)),
                          'price_kwh': price_kwh,
                          'base_delta': base_delta_slot,
                          'batt_cap': battery_slot_u_full,
                          'mode': 'partial'
                        }] %}
                      {% endif %}
                    {% endif %}
                  {% endif %}
                {% endif %}
              {% endif %}
            {% endfor %}
  
            {% set full_sorted = ns.full | sort(attribute='price_kwh', reverse=true) %}
            {% set partial_sorted = ns.partial | sort(attribute='price_kwh', reverse=true) %}
  
            {# --- wybór FULL: maksymalnie do floor, bez patrzenia na 22:00 --- #}
            {% set nsFull = namespace(rem=sellable_full_now, chosen=[], batt_sum=0.0, export_sum=0.0, lines='') %}
            {% for s in full_sorted %}
              {% if nsFull.rem > 0.001 %}
                {% set batt_use = [s.batt_cap, nsFull.rem] | min %}
                {% if batt_use < 0 %}
                  {% set batt_use = 0 %}
                {% endif %}
                {% set export_energy = s.base_delta + batt_use %}
                {% if export_energy < 0 %}
                  {% set export_energy = 0 %}
                {% endif %}
                {% if batt_use > 0 or export_energy > 0 %}
                  {% set nsFull.chosen = nsFull.chosen + [{
                    'period': s.period,
                    'price_kwh': s.price_kwh,
                    'price_mwh': s.price_mwh,
                    'batt_use': batt_use,
                    'export_energy': export_energy,
                    'mode': 'full'
                  }] %}
                  {% set nsFull.rem = nsFull.rem - batt_use %}
                  {% set nsFull.batt_sum = nsFull.batt_sum + batt_use %}
                  {% set nsFull.export_sum = nsFull.export_sum + export_energy %}
                  {% set nsFull.lines = nsFull.lines ~
                    "\n- " ~ s.period ~
                    " | " ~ (s.price_mwh | round(1)) ~ " PLN/MWh" ~
                    " | mode:full" ~
                    " | bat:" ~ (batt_use | round(3)) ~ " kWh" ~
                    " | export:" ~ (export_energy | round(3)) ~ " kWh"
                  %}
                {% endif %}
              {% endif %}
            {% endfor %}
  
            {# --- PARTIAL dostaje tylko resztę budżetu po FULL,
                 ale nigdy więcej niż sellable_partial_baseline (= 0 przy bilansowaniu 1/2) --- #}
            {% set E_after_full = E0_u - nsFull.batt_sum %}
            {% if E_after_full < 0 %}
              {% set E_after_full = 0 %}
            {% endif %}

            {% set sellable_partial_after_full = E_after_full - E_required_partial %}
            {% if sellable_partial_after_full < 0 %}
              {% set sellable_partial_after_full = 0 %}
            {% endif %}
            {% if sellable_partial_after_full > sellable_partial_baseline %}
              {% set sellable_partial_after_full = sellable_partial_baseline %}
            {% endif %}
  
            {# --- wybór PARTIAL: batt_use to już energia sprzedażowa --- #}
            {% set nsPart = namespace(rem=sellable_partial_after_full, chosen=[], batt_sum=0.0, export_sum=0.0, lines='') %}
            {% for s in partial_sorted %}
              {% if nsPart.rem > 0.001 %}
                {% set batt_use = [s.batt_cap, nsPart.rem] | min %}
                {% if batt_use < 0 %}
                  {% set batt_use = 0 %}
                {% endif %}
                {% set export_energy = batt_use %}
                {% if batt_use > 0 or export_energy > 0 %}
                  {% set nsPart.chosen = nsPart.chosen + [{
                    'period': s.period,
                    'price_kwh': s.price_kwh,
                    'price_mwh': s.price_mwh,
                    'batt_use': batt_use,
                    'export_energy': export_energy,
                    'mode': 'partial'
                  }] %}
                  {% set nsPart.rem = nsPart.rem - batt_use %}
                  {% set nsPart.batt_sum = nsPart.batt_sum + batt_use %}
                  {% set nsPart.export_sum = nsPart.export_sum + export_energy %}
                  {% set nsPart.lines = nsPart.lines ~
                    "\n- " ~ s.period ~
                    " | " ~ (s.price_mwh | round(1)) ~ " PLN/MWh" ~
                    " | mode:partial" ~
                    " | bat:" ~ (batt_use | round(3)) ~ " kWh" ~
                    " | export:" ~ (export_energy | round(3)) ~ " kWh"
                  %}
                {% endif %}
              {% endif %}
            {% endfor %}
  
            {# --- plan łączny, FULL ma priorytet biznesowy i budżetowy --- #}
            {% set chosen_all = nsFull.chosen + nsPart.chosen %}
            {% set plan_list = chosen_all | map(attribute='period') | list %}
            {% set in_plan_now = current_slot_period in plan_list %}
            {% set top_lines = nsFull.lines ~ nsPart.lines %}
  
            {# --- parametry bieżącego slotu --- #}
            {% set nsCur = namespace(batt_use=0.0, export_energy=0.0, mode='partial') %}
            {% for s in chosen_all %}
              {% if s.period == current_slot_period %}
                {% set nsCur.batt_use = s.batt_use %}
                {% set nsCur.export_energy = s.export_energy %}
                {% set nsCur.mode = s.mode %}
              {% endif %}
            {% endfor %}
  
            {% set E_required_base = E_required_partial if nsCur.mode != 'full' else 0 %}
            {% set soc_stop_target = (((E_required_base + nsCur.batt_use + floor_kwh) / pojemnosc_kwh) * 100) | round(0) | int %}
            {% if nsCur.mode == 'full' %}
              {% set soc_stop_target = (((floor_kwh + reserve_do_konca_godziny_kwh) / pojemnosc_kwh) * 100) | round(0) | int %}
            {% endif %}
            {% if soc_stop_target > 100 %}
              {% set soc_stop_target = 100 %}
            {% endif %}
            {% if soc_stop_target < (soc_floor_pct | int(20)) %}
              {% set soc_stop_target = soc_floor_pct | int(20) %}
            {% endif %}
  
            {% set should_partial_now = cena_kwh >= prog_czesciowy %}
            {% set should_full_now = cena_kwh >= prog_pelny %}

            {% set E_after_plan_22 = E0_u - nsFull.batt_sum - nsPart.batt_sum - energia_dom_z_baterii_do_22 %}
            {% if E_after_plan_22 < 0 %}
              {% set E_after_plan_22 = 0 %}
            {% endif %}
            {% set soc_expected_22 = (((E_after_plan_22 + floor_kwh) / pojemnosc_kwh) * 100) | round(1) %}
            {% if soc_expected_22 > 100 %}
              {% set soc_expected_22 = 100 %}
            {% endif %}

  
            {{ current_slot_period }}###{{ cena_kwh | round(4) }}###{{ soc_stop_target }}###{{ pv_hours_debug }}###{{ E0_u | round(2) }}###{{ E_required_partial | round(2) }}###{{ E_reserve_u | round(2) }}###{{ sellable_partial_baseline | round(2) }}###{{ sellable_partial_after_full | round(2) }}###{{ sellable_full_now | round(2) }}###{{ battery_slot_u_full | round(2) }}###{{ (full_sorted | length) }}###{{ (partial_sorted | length) }}###{{ (plan_list | length) }}###{{ nsFull.batt_sum | round(2) }}###{{ nsPart.batt_sum | round(2) }}###{{ (nsFull.export_sum + nsPart.export_sum) | round(2) }}###{{ plan_list | join('|') }}###{{ in_plan_now }}###{{ top_lines }}###{{ nsCur.batt_use | round(3) }}###{{ nsCur.export_energy | round(3) }}###{{ nsCur.mode }}###{{ 'YES' if should_partial_now else 'NO' }}###{{ 'YES' if should_full_now else 'NO' }}###{{ soc_expected_22 }}###{{ reserve_do_konca_godziny_kwh | round(3) }}###{{ house_kwh_this_slot | round(3) }}
  
      - variables:
          slot_period: "{{ pack.split('###')[0] }}"
          cena_kwh_dbg: "{{ pack.split('###')[1] | float(0) }}"
          soc_stop_target: "{{ pack.split('###')[2] | int(20) }}"
          pv_hours: "{{ pack.split('###')[3] }}"
          E0_u: "{{ pack.split('###')[4] | float(0) }}"
          E_required_partial: "{{ pack.split('###')[5] | float(0) }}"
          E_reserve_u: "{{ pack.split('###')[6] | float(0) }}"
          sellable_partial_baseline: "{{ pack.split('###')[7] | float(0) }}"
          sellable_partial_now: "{{ pack.split('###')[8] | float(0) }}"
          sellable_full_now: "{{ pack.split('###')[9] | float(0) }}"
          battery_slot_u_full: "{{ pack.split('###')[10] | float(0) }}"
          full_candidate_count: "{{ pack.split('###')[11] | int(0) }}"
          partial_candidate_count: "{{ pack.split('###')[12] | int(0) }}"
          plan_count: "{{ pack.split('###')[13] | int(0) }}"
          plan_batt_sum_full: "{{ pack.split('###')[14] | float(0) }}"
          plan_batt_sum_partial: "{{ pack.split('###')[15] | float(0) }}"
          plan_export_sum: "{{ pack.split('###')[16] | float(0) }}"
          plan_slotow: "{{ pack.split('###')[17] }}"
          plan_list: "{{ plan_slotow.split('|') if plan_slotow | length > 0 else [] }}"
          in_plan_now: "{{ pack.split('###')[18] == 'True' }}"
          top_lines: "{{ pack.split('###')[19] }}"
          current_slot_batt_use: "{{ pack.split('###')[20] | float(0) }}"
          current_slot_export_energy: "{{ pack.split('###')[21] | float(0) }}"
          current_slot_mode: "{{ pack.split('###')[22] }}"
          should_partial_now: "{{ pack.split('###')[23] == 'YES' }}"
          should_full_now: "{{ pack.split('###')[24] == 'YES' }}"
          soc_expected_22: "{{ pack.split('###')[25] | float(0) }}"
          reserve_do_konca_godziny_kwh: "{{ pack.split('###')[26] | float(0) }}"
          house_kwh_this_slot: "{{ pack.split('###')[27] | float(0) }}"
  
      - service: var.set
        data:
          entity_id: var.magazyn_soc_stop_export_wieczor
          value: "{{ soc_stop_target }}"
          attributes:
            last_update: "{{ now().strftime('%Y-%m-%d %H:%M:%S') }}"
            time: "{{ t_now }}"
            slot: "{{ slot_period }}"
            cena_pln_kwh: "{{ cena_kwh_dbg }}"
            prog_partial: "{{ prog_czesciowy }}"
            prog_full: "{{ prog_pelny }}"
            should_full: "{{ should_full_now }}"
            should_partial: "{{ should_partial_now }}"
            in_plan_now: "{{ in_plan_now }}"
            current_slot_mode: "{{ current_slot_mode }}"
            current_slot_batt_use: "{{ current_slot_batt_use }}"
            current_slot_export_energy: "{{ current_slot_export_energy }}"
            sellable_partial_baseline: "{{ sellable_partial_baseline }}"
            sellable_partial_now: "{{ sellable_partial_now }}"
            sellable_full_now: "{{ sellable_full_now }}"
            plan_count: "{{ plan_count }}"
            full_candidate_count: "{{ full_candidate_count }}"
            partial_candidate_count: "{{ partial_candidate_count }}"
            plan_batt_sum_full: "{{ plan_batt_sum_full }}"
            plan_batt_sum_partial: "{{ plan_batt_sum_partial }}"
            plan_export_sum: "{{ plan_export_sum }}"
            pv_hours: "{{ pv_hours }}"
            soc_expected_22: "{{ soc_expected_22 }}"  
      - service: system_log.write
        data:
          level: warning
          message: >
            EXPORT_WIECZOR {{ t_now }} slot="{{ slot_period }}" price={{ cena_kwh_dbg | round(3) }}
            | prog_partial={{ prog_czesciowy | round(3) }} prog_full={{ prog_pelny | round(3) }}
            | SOC={{ soc_now | round(1) }}% stop={{ soc_stop_target }}%
            | E0={{ E0_u }} EreqPartial={{ E_required_partial }} Eres={{ E_reserve_u }}
            | sell_partial_base={{ sellable_partial_baseline }} sell_partial_after_full={{ sellable_partial_now }} sell_full={{ sellable_full_now }}
            | full_candidates={{ full_candidate_count }} partial_candidates={{ partial_candidate_count }} plan={{ plan_count }}
            | batt_full={{ plan_batt_sum_full }} batt_partial={{ plan_batt_sum_partial }} export_sum={{ plan_export_sum }}
            | slot_mode={{ current_slot_mode }} current_batt={{ current_slot_batt_use }} current_export={{ current_slot_export_energy }}
            | in_plan={{ 'YES' if in_plan_now else 'NO' }}
            | pv_hours={{ pv_hours }}
  
      - choose:
          - conditions:
              - condition: template
                # value_template: "{{ t_now == '15:00' }}"
                value_template: "{{ true }}"
            sequence:
              - service: script.ems_notify
                data:
                  title: "📊 Plan eksportu wieczornego"
                  message: >
                    🎯 Budżet baterii:
                    - PARTIAL baseline (bez priorytetu FULL): {{ sellable_partial_baseline | round(2) }} kWh
                    - PARTIAL po alokacji FULL: {{ sellable_partial_now | round(2) }} kWh
                    - FULL (maks do floor): {{ sellable_full_now | round(2) }} kWh
                    - 🔒 Rezerwa po slocie (reszta godz.): {{ reserve_do_konca_godziny_kwh | round(3) }} kWh
                    - 🏠 Zużycie domu ten slot: {{ house_kwh_this_slot | round(3) }} kWh
  
                    📦 Plan:
                    - Slotów: {{ plan_count }}
                    - FULL kandydatów: {{ full_candidate_count }}
                    - PARTIAL kandydatów: {{ partial_candidate_count }}
                    - Energia z baterii FULL: {{ plan_batt_sum_full | round(2) }} kWh
                    - Energia z baterii PARTIAL: {{ plan_batt_sum_partial | round(2) }} kWh
                    - Szac. eksport: {{ plan_export_sum | round(2) }} kWh
                    - Dane PV: {{ pv_hours }}
  
                    💰 Najlepsze sloty:{{ top_lines }}
  
                    🔋 SOC: {{ soc_now | round(1) }}%
                    🛡️ Komfort do 22:00: {{ soc_comfort_pct }}%
                    🛡️ Floor techniczny: {{ soc_floor_pct }}%
                    🔮 Spodziewany SOC o 22:00: {{ soc_expected_22 }}%
  
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ not in_plan_now or current_slot_batt_use <= 0 }}"
            sequence:
              - service: input_boolean.turn_off
                target:
                  entity_id: input_boolean.battery_discharge_to_grid
  
              - delay: "00:00:03"
  
              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ was_discharging }}"
                    sequence:
                      - service: script.ems_notify
                        data:
                          title: "⏸️ STOP eksportu - poza planem"
                          message: >
                            {{ t_now }} | Slot {{ slot_period }}
                            | Cena: {{ cena_kwh_dbg | round(3) }} PLN/kWh
                            | W planie: {{ 'TAK' if in_plan_now else 'NIE' }}
                            | Tryb slotu: {{ current_slot_mode }}
                            | Bateria slot: {{ current_slot_batt_use | round(3) }} kWh
                            | SOC: {{ soc_now | round(1) }}%
  
          - conditions:
              - condition: template
                value_template: "{{ soc_now <= soc_stop_target }}"
            sequence:
              - service: input_boolean.turn_off
                target:
                  entity_id: input_boolean.battery_discharge_to_grid
  
              - delay: "00:00:03"
  
              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ was_discharging }}"
                    sequence:
                      - service: script.ems_notify
                        data:
                          title: "⚠️ STOP eksportu - osiągnięto SOC stop"
                          message: >
                            {{ t_now }} | SOC: {{ soc_now | round(1) }}% <= {{ soc_stop_target }}%
                            | Slot: {{ slot_period }}
                            | Tryb slotu: {{ current_slot_mode }}
  
          - conditions:
              - condition: template
                value_template: "{{ in_plan_now and soc_now > soc_stop_target and current_slot_batt_use > 0 }}"
            sequence:
              - service: input_boolean.turn_on
                target:
                  entity_id: input_boolean.battery_discharge_to_grid
  
              - choose:
                  - conditions:
                      - condition: template
                        value_template: "{{ not was_discharging }}"
                    sequence:
                      - service: script.ems_notify
                        data:
                          title: "🚀 START eksportu wieczornego"
                          message: >
                            {{ t_now }} | Slot {{ slot_period }}
                            | Cena: {{ cena_kwh_dbg | round(3) }} PLN/kWh
                            | Tryb: {{ current_slot_mode | upper }}
                            | Plan slotu:
                            - bateria: {{ current_slot_batt_use | round(3) }} kWh
                            - szac. eksport: {{ current_slot_export_energy | round(3) }} kWh
                            | SOC: {{ soc_now | round(1) }}% > {{ soc_stop_target }}%
  
        default:
          - service: input_boolean.turn_off
            target:
              entity_id: input_boolean.battery_discharge_to_grid
  
          - delay: "00:00:03"
  
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ t_now == '21:45' }}"
            sequence:
              - service: script.ems_notify
                data:
                  title: "📈 Podsumowanie eksportu wieczornego"
                  message: >
                    📦 Plan:
                    - Slotów: {{ plan_count }}
                    - FULL kandydatów: {{ full_candidate_count }}
                    - PARTIAL kandydatów: {{ partial_candidate_count }}
                    - Energia z baterii FULL: {{ plan_batt_sum_full | round(2) }} kWh
                    - Energia z baterii PARTIAL: {{ plan_batt_sum_partial | round(2) }} kWh
                    - Szac. eksport: {{ plan_export_sum | round(2) }} kWh
  
                    🔋 SOC teraz: {{ soc_now | round(1) }}%
                    🛡️ SOC stop dla tego slotu: {{ soc_stop_target }}%
                    ☀️ PV debug: {{ pv_hours }}
                    🔮 Spodziewany SOC o 22:00: {{ soc_expected_22 }}%


###############################################################################
# (2) STOPPER: reaguj na SOC i wyłącz oddawanie, gdy osiągniemy zapisany próg
###############################################################################
  - alias: "Magazyn: STOP eksport wieczór – SOC <= próg"
    id: magazyn_stop_export_wieczor_soc
    mode: single
    trigger:
      - platform: state
        entity_id: sensor.solarman_battery_safe

    action:
      - variables:
          soc_now: "{{ states('sensor.solarman_battery_safe') | float(0) }}"
          soc_stop: "{{ states('var.magazyn_soc_stop_export_wieczor') | float(20) }}"
          discharging: "{{ is_state('input_boolean.battery_discharge_to_grid', 'on') }}"

      - choose:
          - conditions:
              - condition: template
                value_template: "{{ discharging and soc_now <= soc_stop }}"
            sequence:
              - service: input_boolean.turn_off
                target:
                  entity_id: input_boolean.battery_discharge_to_grid
              - service: system_log.write
                data:
                  level: warning
                  message: >
                    STOPPER_WIECZOR: SOC {{ soc_now | round(1) }}% <= {{ soc_stop | round(0) }}% -> battery_discharge_to_grid OFF
        default: []



  ###############################################################################
  # NOCNA BLOKADA ROZŁADOWANIA (22:00)
  # v3.11:
  # - FULL = koszt_drozsza + min_zysk_sprzedaz
  # - PARTIAL = koszt_tansza + min_zysk_sprzedaz
  # - wybór slotów po cenie malejąco
  # - automat pełni rolę blokady, nie planera ładowania
  ###############################################################################

  - id: magazyn_blokada_rozladowania_noc_v3_11_plan_na_jutro
    alias: "Magazyn: Blokada rozładowania na noc (22:00) v3.11"
    description: >
      O 22:00:
      - sprawdza dostępność danych PV na jutro
      - analizuje ceny rano (06:00-13:00)
      - analizuje prognozę PV na jutro
      - sprawdza, czy jutro będzie prawdziwy spill (overflow magazynu >100%)
      - jeśli spill + użyteczne sloty cenowe dla obecnego budżetu baterii:
        zostawia energię na poranny eksport + przetrwanie
      - jeśli spill bez użytecznych slotów: zostawia tylko energię na przetrwanie
      - jeśli brak spillu: zostawia tylko energię na przetrwanie
      - v3.11:
        * FULL = koszt_drozsza + min_zysk_sprzedaz
        * PARTIAL = koszt_tansza + min_zysk_sprzedaz
        * wybór slotów po cenie malejąco
        * automat pełni rolę blokady, nie planera ładowania
        * booked_soc nie spadnie poniżej var.magazyn_soc_min_rano_percent (floor rano)
    mode: single
  
    trigger:
      - platform: time
        at: "22:00:00"
  
    condition:
      - condition: template
        value_template: >
          {% set forecast_data = state_attr('sensor.solcast_pv_forecast_prognoza_na_jutro', 'detailedHourly') or [] %}
          {{ forecast_data | length > 0 }}
  
    action:
      - variables:
          soc_teraz: "{{ states('sensor.solarman_battery_safe') | float(0) }}"
          tz_to: "{{ now().strftime('%z')[0:3] ~ ':' ~ now().strftime('%z')[3:5] }}"
  
          koszt_tansza: "{{ states('var.magazyn_koszt_calkowity_strefa_tansza_pln_kwh') | float(0) }}"
          koszt_drozsza: "{{ states('var.magazyn_koszt_calkowity_strefa_drozsza_pln_kwh') | float(0) }}"
          min_zysk_sprzedaz: "{{ states('var.magazyn_min_zysk_sprzedaz_pln_kwh') | float(0) }}"
          min_export_price_pv: 0.10
          partial_bat_min_price: >
            {{ (states('var.magazyn_koszt_calkowity_strefa_tansza_pln_kwh') | float(0))
               + (states('var.magazyn_min_zysk_sprzedaz_pln_kwh') | float(0)) }}
          full_bat_min_price: >
            {{ (states('var.magazyn_koszt_calkowity_strefa_drozsza_pln_kwh') | float(0))
               + (states('var.magazyn_min_zysk_sprzedaz_pln_kwh') | float(0)) }}
  
          pojemnosc_kwh: "{{ states('var.magazyn_pojemnosc_brutto_kwh') | float(15) }}"
          soc_floor_pct: "{{ states('var.magazyn_soc_floor_percent') | float(20) }}"
          soc_comfort_pct: "{{ states('var.magazyn_soc_comfort_percent') | float(25) }}"
          soc_min_rano_pct: "{{ states('var.magazyn_soc_min_rano_percent') | float(25) }}"
          soc_buffer_mid_pct: "{{ states('var.magazyn_soc_buffer_mid_percent') | float(5) }}"
          max_moc_rozladowania_kw: "{{ states('var.magazyn_max_moc_rozladowania_kw') | float(6) }}"

          cons_mult: "{{ states('var.magazyn_konsumpcja_multiplier') | float(1.15) }}"
          cons_default: "{{ states('var.magazyn_konsumpcja_default_kwh_h') | float(1.5) }}"
          urlop_kwh_h: "{{ states('var.magazyn_konsumpcja_urlop_kwh_h') | float(0.5) }}"
          sprzatanie_mult: "{{ states('var.magazyn_konsumpcja_mult_sprzatanie') | float(2.0) }}"
          lookback_sec: "{{ (states('var.magazyn_sql_lookback_days_ladowanie') | int(7)) * 86400 }}"

          ceny_jutro: "{{ state_attr('sensor.rce_prices_tomorrow_scaled', 'value') or [] }}"
  
      - service: sql.query
        data:
          query: >
            SELECT
              HOUR(CONVERT_TZ(FROM_UNIXTIME(s.last_updated_ts), '+00:00', '{{ tz_to }}')) AS h,
              AVG(CAST(s.state AS DECIMAL(10,3))) AS avg_h
            FROM states s
            JOIN states_meta m ON s.metadata_id = m.metadata_id
            WHERE m.entity_id = 'sensor.srednie_zuzycie_o_obecnej_godzinie'
              AND s.state NOT IN ('unknown', 'unavailable', '')
              AND s.last_updated_ts > (UNIX_TIMESTAMP(NOW()) - {{ lookback_sec }})
              AND HOUR(CONVERT_TZ(FROM_UNIXTIME(s.last_updated_ts), '+00:00', '{{ tz_to }}')) BETWEEN 6 AND 13
            GROUP BY h
            ORDER BY h;
        response_variable: statystyki_rano

      - service: calendar.get_events
        target:
          entity_id: calendar.urlop
        data:
          start_date_time: "{{ (now() + timedelta(days=1)).strftime('%Y-%m-%d 00:00:00') }}"
          end_date_time: "{{ (now() + timedelta(days=1)).strftime('%Y-%m-%d 23:59:59') }}"
        response_variable: urlop_events

      - service: calendar.get_events
        target:
          entity_id: calendar.sprzatanie
        data:
          start_date_time: "{{ (now() + timedelta(days=1)).strftime('%Y-%m-%d 00:00:00') }}"
          end_date_time: "{{ (now() + timedelta(days=1)).strftime('%Y-%m-%d 23:59:59') }}"
        response_variable: sprzatanie_events

      - variables:
          pack: >-
            {% set forecast_data = state_attr('sensor.solcast_pv_forecast_prognoza_na_jutro', 'detailedHourly') or [] %}

            {# ===== URLOP: lista godzin (YYYY-MM-DD HH) dla JUTRZEJSZEGO planu ===== #}
            {% set urlop_list = (urlop_events['calendar.urlop'].events if (urlop_events and 'calendar.urlop' in urlop_events) else []) %}
            {% set urlop_ns = namespace(hours=[]) %}
            {% for ev in urlop_list %}
              {% set es = as_datetime(ev.start) | as_local %}
              {% set ee = as_datetime(ev.end) | as_local %}
              {% for off in range(0, 24) %}
                {% set probe = (now() + timedelta(days=1)).replace(hour=0, minute=30, second=0, microsecond=0) + timedelta(hours=off) %}
                {% if probe >= es and probe < ee %}
                  {% set hk = probe.strftime('%Y-%m-%d %H') %}
                  {% if hk not in urlop_ns.hours %}
                    {% set urlop_ns.hours = urlop_ns.hours + [hk] %}
                  {% endif %}
                {% endif %}
              {% endfor %}
            {% endfor %}
            {% set urlop_hours = urlop_ns.hours %}

            {# ===== SPRZATANIE: lista godzin (YYYY-MM-DD HH) dla JUTRZEJSZEGO planu ===== #}
            {% set sprzatanie_list = (sprzatanie_events['calendar.sprzatanie'].events if (sprzatanie_events and 'calendar.sprzatanie' in sprzatanie_events) else []) %}
            {% set sprzatanie_ns = namespace(hours=[]) %}
            {% for ev in sprzatanie_list %}
              {% set es = as_datetime(ev.start) | as_local %}
              {% set ee = as_datetime(ev.end) | as_local %}
              {% for off in range(0, 24) %}
                {% set probe = (now() + timedelta(days=1)).replace(hour=0, minute=30, second=0, microsecond=0) + timedelta(hours=off) %}
                {% if probe >= es and probe < ee %}
                  {% set hk = probe.strftime('%Y-%m-%d %H') %}
                  {% if hk not in sprzatanie_ns.hours %}
                    {% set sprzatanie_ns.hours = sprzatanie_ns.hours + [hk] %}
                  {% endif %}
                {% endif %}
              {% endfor %}
            {% endfor %}
            {% set sprzatanie_hours = sprzatanie_ns.hours %}

            {# --- zużycie dict --- #}
            {% set rows = statystyki_rano['result'] if (statystyki_rano is mapping and 'result' in statystyki_rano) else [] %}
            {% set nsC = namespace(d={}) %}
            {% for row in rows %}
              {% set nsC.d = nsC.d | combine({ (row['h']|int): (row['avg_h']|float(0)) }) %}
            {% endfor %}
            {% set dict_z = nsC.d %}
  
            {# --- PV dict jutro 06-13 --- #}
            {% set jutro = (now() + timedelta(days=1)).date() %}
            {% set plan_date = jutro %}
            {% set nsP = namespace(d={}, count=0, debug='') %}
            {% set nsP.debug = "jutro:" ~ jutro ~ "|len:" ~ (forecast_data | length if forecast_data else 0) %}
  
            {% if forecast_data is iterable and forecast_data is not string and forecast_data | length > 0 %}
              {% for item in forecast_data %}
                {% if item is mapping %}
                  {% set ts = as_local(as_datetime(item.period_start or item.datetime)) %}
                  {% if ts.date() == jutro and ts.hour >= 6 and ts.hour <= 21 %}
                    {% set pv_value = (item.pv_estimate or item.pv_forecast or 0) | float(0) %}
                    {% set nsP.d = nsP.d | combine({ ts.hour: pv_value }) %}
                    {% set nsP.count = nsP.count + 1 %}
                  {% endif %}
                {% endif %}
              {% endfor %}
            {% else %}
              {% set nsP.debug = nsP.debug ~ "|EMPTY_OR_STRING" %}
            {% endif %}
  
            {% set pv_d = nsP.d %}
            {% set pv_debug = "parsed:" ~ nsP.count ~ "|" ~ nsP.debug ~ "|pv_d:" ~ pv_d %}

            {# --- koniec produkcji PV wg prognozy (spill liczony do pv_end_excl, fallback 14) --- #}
            {% set nsE = namespace(last=13) %}
            {% for h in range(0, 24) %}
              {% if pv_d.get(h, 0) > 0.1 %}{% set nsE.last = h %}{% endif %}
            {% endfor %}
            {% set pv_end_excl = nsE.last + 1 %}
            {% if pv_end_excl < 14 %}{% set pv_end_excl = 14 %}{% endif %}
  
            {# --- rezerwa komfortowa --- #}
            {% set floor_kwh = (pojemnosc_kwh * soc_floor_pct / 100) %}
            {% set comfort_kwh = (pojemnosc_kwh * soc_comfort_pct / 100) %}
            {% set reserve_kwh = comfort_kwh - floor_kwh %}
            {% if reserve_kwh < 0 %}{% set reserve_kwh = 0 %}{% endif %}
  
            {# --- jutrzejsze min SOC do 13:00 --- #}
            {% set ns_cons = namespace(total=0.0) %}
            {% for h in range(6, 14) %}
              {% set hk = plan_date.strftime('%Y-%m-%d') ~ ' ' ~ '%02d'|format(h) %}
              {% set is_urlop_h = hk in urlop_hours %}
              {% set is_sprzatanie_h = hk in sprzatanie_hours %}
              {% set z_h = (dict_z.get(h, cons_default)) * sprzatanie_mult if is_sprzatanie_h else (urlop_kwh_h if is_urlop_h else (dict_z.get(h, cons_default)) * cons_mult) %}
              {% set ns_cons.total = ns_cons.total + z_h %}
            {% endfor %}
            {% set total_cons_6_13 = ns_cons.total %}
  
            {% set ns_pv_sum = namespace(total=0.0) %}
            {% for h in range(6, 14) %}
              {% set pv_h = pv_d.get(h, 0) %}
              {% set ns_pv_sum.total = ns_pv_sum.total + pv_h %}
            {% endfor %}
            {% set total_pv_sum_6_13 = ns_pv_sum.total %}
  
            {% set energia_z_baterii_do_13 = total_cons_6_13 - total_pv_sum_6_13 %}
            {% if energia_z_baterii_do_13 < 0 %}{% set energia_z_baterii_do_13 = 0 %}{% endif %}
  
            {% set E_min_partial = energia_z_baterii_do_13 + reserve_kwh %}
            {% set soc_min_dynamic_13_tomorrow = ((E_min_partial + floor_kwh) / pojemnosc_kwh * 100) | round(0) | int %}
            {% if soc_min_dynamic_13_tomorrow < (soc_floor_pct | int(20)) %}{% set soc_min_dynamic_13_tomorrow = soc_floor_pct | int(20) %}{% endif %}
            {% if soc_min_dynamic_13_tomorrow > 100 %}{% set soc_min_dynamic_13_tomorrow = 100 %}{% endif %}
  
            {% set soc_mid_stop_tomorrow = soc_min_dynamic_13_tomorrow + soc_buffer_mid_pct %}
            {% if soc_mid_stop_tomorrow > 100 %}{% set soc_mid_stop_tomorrow = 100 %}{% endif %}
  
            {# --- prawdziwy spill od bieżącego SOC: overflow magazynu >100% --- #}
            {% set nsSpill = namespace(
              will=false,
              start_h=13,
              lines='',
              batt_kwh=((soc_teraz / 100) * pojemnosc_kwh)
            ) %}
  
            {% for h in range(6, pv_end_excl) %}
              {% set pv_h = pv_d.get(h, 0) %}
              {% set hk = plan_date.strftime('%Y-%m-%d') ~ ' ' ~ '%02d'|format(h) %}
              {% set is_urlop_h = hk in urlop_hours %}
              {% set is_sprzatanie_h = hk in sprzatanie_hours %}
              {% set z_h = (dict_z.get(h, cons_default)) * sprzatanie_mult if is_sprzatanie_h else (urlop_kwh_h if is_urlop_h else (dict_z.get(h, cons_default)) * cons_mult) %}
              {% set net_h = pv_h - z_h %}
              {% set batt_before = nsSpill.batt_kwh %}
              {% set batt_after_raw = batt_before + net_h %}
  
              {% if batt_after_raw > pojemnosc_kwh %}
                {% set spill_h = batt_after_raw - pojemnosc_kwh %}
                {% if not nsSpill.will %}
                  {% set nsSpill.will = true %}
                  {% set nsSpill.start_h = h %}
                {% endif %}
                {% set nsSpill.lines = nsSpill.lines ~
                  "\n- h" ~ h ~
                  " | batt_before:" ~ (batt_before|round(2)) ~
                  " | pv:" ~ (pv_h|round(2)) ~
                  " | cons:" ~ (z_h|round(2)) ~
                  " | batt_after_raw:" ~ (batt_after_raw|round(2)) ~
                  " | spill:" ~ (spill_h|round(2))
                %}
                {% set nsSpill.batt_kwh = pojemnosc_kwh %}
              {% elif batt_after_raw < 0 %}
                {% set nsSpill.batt_kwh = 0 %}
              {% else %}
                {% set nsSpill.batt_kwh = batt_after_raw %}
              {% endif %}
            {% endfor %}
            {% set will_spill = nsSpill.will %}
            {% set spill_start_hour = nsSpill.start_h %}
  
            {# --- energia potrzebna by przetrwać od 06:00 do spill_start_hour lub do 13:00 --- #}
            {% set survive_to_hour = spill_start_hour if will_spill else 13 %}
            {% set nsSurvive = namespace(total=0.0, lines='') %}
            {% for h in range(6, survive_to_hour) %}
              {% set pv_h = pv_d.get(h, 0) %}
              {% set hk = plan_date.strftime('%Y-%m-%d') ~ ' ' ~ '%02d'|format(h) %}
              {% set is_urlop_h = hk in urlop_hours %}
              {% set is_sprzatanie_h = hk in sprzatanie_hours %}
              {% set z_h = (dict_z.get(h, cons_default)) * sprzatanie_mult if is_sprzatanie_h else (urlop_kwh_h if is_urlop_h else (dict_z.get(h, cons_default)) * cons_mult) %}
              {% set batt_h = z_h - pv_h %}
              {% if batt_h < 0 %}{% set batt_h = 0 %}{% endif %}
              {% set nsSurvive.total = nsSurvive.total + batt_h %}
              {% set nsSurvive.lines = nsSurvive.lines ~
                "\n- h" ~ h ~
                " | cons:" ~ (z_h|round(2)) ~
                " | pv:" ~ (pv_h|round(2)) ~
                " | batt:" ~ (batt_h|round(2))
              %}
            {% endfor %}
            {% set survival_energy = nsSurvive.total %}
  
            {# --- realny budżet baterii na jutro rano: tylko z obecnego SOC --- #}
            {% set energy_now_kwh = (soc_teraz / 100) * pojemnosc_kwh %}
            {% set energy_min_high_kwh = (soc_min_dynamic_13_tomorrow / 100) * pojemnosc_kwh %}
            {% set battery_budget_high = energy_now_kwh - energy_min_high_kwh %}
            {% if battery_budget_high < 0 %}{% set battery_budget_high = 0 %}{% endif %}
  
            {% set battery_slot_cap_kwh = max_moc_rozladowania_kw * 0.25 %}
            {% if battery_slot_cap_kwh < 0 %}{% set battery_slot_cap_kwh = 0 %}{% endif %}
  
            {# --- kandydaci FULL / PARTIAL rano, sortowane po cenie --- #}
            {% set nsFullCand = namespace(list=[]) %}
            {% set nsPartCand = namespace(list=[]) %}
  
            {% for c in ceny_jutro %}
              {% if c is mapping and c.period is defined %}
                {% set p = (c.period | string).replace('–','-') %}
                {% set p2 = p.replace(' ', '') %}
                {% if '-' in p2 %}
                  {% set parts = p2.split('-') %}
                  {% set start = parts[0] %}
                  {% set hm = start.split(':') %}
                  {% if hm|length == 2 %}
                    {% set h = hm[0]|int %}
                    {% set price_mwh = c.rce_pln | float(0) %}
                    {% set price_kwh = price_mwh / 1000 %}
  
                    {% if h >= 6 and h < 13 %}
                      {% set pv_h = pv_d.get(h, 0) %}
                      {% set hk = plan_date.strftime('%Y-%m-%d') ~ ' ' ~ '%02d'|format(h) %}
              {% set is_urlop_h = hk in urlop_hours %}
              {% set is_sprzatanie_h = hk in sprzatanie_hours %}
              {% set z_h = (dict_z.get(h, cons_default)) * sprzatanie_mult if is_sprzatanie_h else (urlop_kwh_h if is_urlop_h else (dict_z.get(h, cons_default)) * cons_mult) %}
                      {% set pv_slot_energy = (pv_h - z_h) / 4 %}
                      {% if pv_slot_energy < 0 %}{% set pv_slot_energy = 0 %}{% endif %}
  
                      {% if price_kwh >= full_bat_min_price %}
                        {% set nsFullCand.list = nsFullCand.list + [{
                          'period': c.period,
                          'h': h,
                          'price_mwh': price_mwh,
                          'price_kwh': price_kwh,
                          'pv_slot_energy': pv_slot_energy,
                          'bat_cap': battery_slot_cap_kwh,
                          'mode': 'full'
                        }] %}
                      {% elif price_kwh >= partial_bat_min_price %}
                        {% set nsPartCand.list = nsPartCand.list + [{
                          'period': c.period,
                          'h': h,
                          'price_mwh': price_mwh,
                          'price_kwh': price_kwh,
                          'pv_slot_energy': pv_slot_energy,
                          'bat_cap': battery_slot_cap_kwh,
                          'mode': 'partial'
                        }] %}
                      {% endif %}
                    {% endif %}
                  {% endif %}
                {% endif %}
              {% endif %}
            {% endfor %}
  
            {% set full_sorted = nsFullCand.list | sort(attribute='price_kwh', reverse=true) %}
            {% set part_sorted = nsPartCand.list | sort(attribute='price_kwh', reverse=true) %}
  
            {# --- najpierw FULL --- #}
            {% set nsFull = namespace(rem=battery_budget_high, count=0, export_energy=0.0, lines='') %}
            {% for s in full_sorted %}
              {% if nsFull.rem > 0.001 %}
                {% set slot_bat = [s.bat_cap, nsFull.rem] | min %}
                {% if slot_bat < 0 %}{% set slot_bat = 0 %}{% endif %}
                {% if slot_bat > 0 %}
                  {% set nsFull.count = nsFull.count + 1 %}
                  {% set nsFull.export_energy = nsFull.export_energy + slot_bat %}
                  {% set nsFull.rem = nsFull.rem - slot_bat %}
                  {% set nsFull.lines = nsFull.lines ~
                    "\n- " ~ s.period ~
                    " | FULL | " ~ (s.price_mwh|round(1)) ~ " PLN/MWh" ~
                    " | pv:" ~ (s.pv_slot_energy|round(3)) ~ " kWh" ~
                    " | bat:" ~ (slot_bat|round(3)) ~ " kWh"
                  %}
                {% endif %}
              {% endif %}
            {% endfor %}
  
            {# --- potem PARTIAL z reszty budżetu --- #}
            {% set nsPart = namespace(rem=nsFull.rem, count=0, export_energy=0.0, lines='') %}
            {% for s in part_sorted %}
              {% if nsPart.rem > 0.001 %}
                {% set slot_bat = [s.bat_cap, nsPart.rem] | min %}
                {% if slot_bat < 0 %}{% set slot_bat = 0 %}{% endif %}
                {% if slot_bat > 0 %}
                  {% set nsPart.count = nsPart.count + 1 %}
                  {% set nsPart.export_energy = nsPart.export_energy + slot_bat %}
                  {% set nsPart.rem = nsPart.rem - slot_bat %}
                  {% set nsPart.lines = nsPart.lines ~
                    "\n- " ~ s.period ~
                    " | PARTIAL | " ~ (s.price_mwh|round(1)) ~ " PLN/MWh" ~
                    " | pv:" ~ (s.pv_slot_energy|round(3)) ~ " kWh" ~
                    " | bat:" ~ (slot_bat|round(3)) ~ " kWh"
                  %}
                {% endif %}
              {% endif %}
            {% endfor %}
  
            {% set good_slot_count = nsFull.count + nsPart.count %}
            {% set has_good_price_slots = (good_slot_count > 0) %}
            {% set export_energy_needed = nsFull.export_energy + nsPart.export_energy %}
            {% set good_lines = nsFull.lines ~ nsPart.lines %}
  
            {# --- finalna logika bookingu --- #}
            {% if not will_spill %}
              {% set booked_energy = survival_energy + reserve_kwh %}
              {% set mode = 'no_spill_survival_only' %}
            {% else %}
              {% if has_good_price_slots %}
                {% set booked_energy = survival_energy + export_energy_needed + reserve_kwh %}
                {% set mode = 'spill_good_prices_export_plus_survival' %}
              {% else %}
                {% set booked_energy = survival_energy + reserve_kwh %}
                {% set mode = 'spill_no_good_prices_survival_only' %}
              {% endif %}
            {% endif %}
  
            {% set booked_soc = ((booked_energy + floor_kwh) / pojemnosc_kwh * 100) | round(0) | int %}
            {% if booked_soc < (soc_floor_pct | int(20)) %}{% set booked_soc = soc_floor_pct | int(20) %}{% endif %}
            {% if booked_soc < (soc_min_rano_pct | int(25)) %}{% set booked_soc = soc_min_rano_pct | int(25) %}{% endif %}
            {% if booked_soc > 100 %}{% set booked_soc = 100 %}{% endif %}
  
            {# automat blokady: nie ustawiaj powyżej aktualnego SOC #}
            {% set limit_soc = [booked_soc, (soc_teraz | int)] | min %}
  
            {{ mode }}###{{ will_spill }}###{{ spill_start_hour }}###{{ has_good_price_slots }}###{{ good_slot_count }}###{{ partial_bat_min_price|round(3) }}###{{ full_bat_min_price|round(3) }}###{{ survival_energy|round(2) }}###{{ reserve_kwh|round(2) }}###{{ export_energy_needed|round(2) }}###{{ booked_energy|round(2) }}###{{ booked_soc }}###{{ limit_soc }}###{{ good_lines }}###{{ nsSurvive.lines }}###{{ nsSpill.lines }}###{{ soc_min_dynamic_13_tomorrow }}###{{ soc_mid_stop_tomorrow }}###{{ battery_budget_high|round(2) }}###{{ pv_debug }}
  
      - variables:
          mode_dbg: "{{ pack.split('###')[0] }}"
          will_spill: "{{ pack.split('###')[1] == 'True' }}"
          spill_start_hour: "{{ pack.split('###')[2] | int(13) }}"
          has_good_price_slots: "{{ pack.split('###')[3] == 'True' }}"
          good_slot_count: "{{ pack.split('###')[4] | int(0) }}"
          partial_bat_min_price_dbg: "{{ pack.split('###')[5] | float(0) }}"
          full_bat_min_price_dbg: "{{ pack.split('###')[6] | float(0) }}"
          survival_energy: "{{ pack.split('###')[7] | float(0) }}"
          reserve_kwh: "{{ pack.split('###')[8] | float(0) }}"
          export_energy_needed: "{{ pack.split('###')[9] | float(0) }}"
          booked_energy: "{{ pack.split('###')[10] | float(0) }}"
          booked_soc: "{{ pack.split('###')[11] | int(20) }}"
          limit_soc: "{{ pack.split('###')[12] | int(20) }}"
          good_lines: "{{ pack.split('###')[13] }}"
          survive_lines: "{{ pack.split('###')[14] }}"
          spill_lines: "{{ pack.split('###')[15] }}"
          soc_min_dynamic_13_tomorrow: "{{ pack.split('###')[16] | int(20) }}"
          soc_mid_stop_tomorrow: "{{ pack.split('###')[17] | int(25) }}"
          battery_budget_high: "{{ pack.split('###')[18] | float(0) }}"
          pv_debug: "{{ pack.split('###')[19] }}"
  
      - service: system_log.write
        data:
          level: warning
          message: >
            NOC_V3_11 22:00
            | soc_now={{ soc_teraz | round(1) }}%
            | mode={{ mode_dbg }}
            | will_spill={{ 'YES' if will_spill else 'NO' }}
            | spill_start={{ spill_start_hour }}
            | good_slots={{ 'YES' if has_good_price_slots else 'NO' }} count={{ good_slot_count }}
            | partial_bat_min={{ partial_bat_min_price_dbg }}
            | full_bat_min={{ full_bat_min_price_dbg }}
            | survival={{ survival_energy }} reserve={{ reserve_kwh }} export_need={{ export_energy_needed }}
            | battery_budget_high={{ battery_budget_high }}
            | booked_energy={{ booked_energy }} booked_soc={{ booked_soc }} limit_soc={{ limit_soc }}
            | min13_tomorrow={{ soc_min_dynamic_13_tomorrow }} mid_stop_tomorrow={{ soc_mid_stop_tomorrow }}
            | {{ pv_debug }}
  
      - choose:
          - conditions:
              - condition: template
                value_template: "{{ soc_teraz <= 20 }}"
            sequence:
              - service: input_boolean.turn_off
                target:
                  entity_id:
                    - input_boolean.battery_discharge_to_grid
  
              - delay:
                  seconds: 3
  
              - service: input_boolean.turn_off
                target:
                  entity_id:
                    - input_boolean.pv_discharge_to_grid
  
              - service: script.ems_notify
                data:
                  title: "🌙 NOC v3.11: Brak blokady"
                  message: >
                    Poziom baterii {{ soc_teraz | round(0) }}% jest zbyt niski (<= 20%).
                    Pominięto ustawianie blokady.
  
          - conditions:
              - condition: template
                value_template: "{{ soc_teraz > 20 }}"
            sequence:
              - service: input_number.set_value
                target:
                  entity_id: input_number.manual_battery_charge_limit
                data:
                  value: "{{ limit_soc }}"
  
              - delay:
                  seconds: 3
  
              - service: input_boolean.turn_on
                target:
                  entity_id: input_boolean.battery_charge_from_grid
  
              - service: script.ems_notify
                data:
                  title: "🌙 NOC v3.11: Booking magazynu na jutro"
                  message: >
                    SOC teraz: {{ soc_teraz | round(0) }}%
                    Ustawiony limit: {{ limit_soc }}%
  
                    Tryb: {{ mode_dbg }}
  
                    Jutro spill: {{ 'TAK' if will_spill else 'NIE' }}
                    Start spillu: {{ '%02d:00' | format(spill_start_hour) if will_spill else 'brak' }}
  
                    Użyteczne sloty cenowe rano: {{ 'TAK' if has_good_price_slots else 'NIE' }}
                    Liczba slotów: {{ good_slot_count }}
                    Próg PARTIAL: {{ partial_bat_min_price_dbg | round(3) }} PLN/kWh
                    Próg FULL: {{ full_bat_min_price_dbg | round(3) }} PLN/kWh
  
                    Energia na przetrwanie: {{ survival_energy | round(2) }} kWh
                    Rezerwa komfortowa: {{ reserve_kwh | round(2) }} kWh
                    Energia na poranny eksport: {{ export_energy_needed | round(2) }} kWh
                    Budżet BAT HIGH z obecnego SOC: {{ battery_budget_high | round(2) }} kWh
                    Razem booked: {{ booked_energy | round(2) }} kWh
                    Booked SOC: {{ booked_soc }}%
  
                    Jutrzejszy min SOC do 13:00: {{ soc_min_dynamic_13_tomorrow }}%
                    Min SOC rano (floor): {{ soc_min_rano_pct }}%
                    Jutrzejszy mid stop: {{ soc_mid_stop_tomorrow }}%
  
                    PV debug:
                    {{ pv_debug }}
  
                    Sloty użyteczne cenowo:
                    {{ good_lines if good_lines | length > 0 else '\n- brak' }}
  
                    Przetrwanie do spillu / 13:00:
                    {{ survive_lines if survive_lines | length > 0 else '\n- brak' }}
  
                    Godziny przepełnienia magazynu:
                    {{ spill_lines if spill_lines | length > 0 else '\n- brak' }}

  ###############################################################################
  # BILANSOWANIE GODZINOWE — zadanie 2/2 (Asana 1214026027008583)
  #
  # KONTEKST PRAWNY:
  # Prosument w net-billingu rozliczany jest godzinowo: w obrebie jednej godziny
  # zegarowej eksport i import sa netowane 1:1. Jesli import_h > eksport_h,
  # roznica placona po cenie zakupu (koszt_drozsza). Jesli eksport_h >= import_h,
  # caly import jest "zjedzony" po cenie RCE - plus netto sprzedaz.
  #
  # POMYSL:
  # O HH:45 sprawdz realne saldo importu/eksportu w biezacej godzinie i jesli
  # jest deficyt - wlacz rozladowanie baterii przez ostatnie 15 min, aby godzina
  # zamknela sie bilansowo.
  #
  # ZALOZENIA:
  # - Snapshot licznikow robiony o HH:00 przez osobna automatyzacje.
  # - Jeden strzal na godzine (HH:45:30 - 30s po triggerze planera).
  # - NIE wylacza rozladowania (robi to planer w nowej godzinie).
  # - Nie narusza SOC floor: rano var.magazyn_soc_min_rano_percent,
  #   wieczorem var.magazyn_soc_floor_percent.
  # - Jesli snapshot nie zostal odswiezony w biezacej godzinie (restart HA)
  #   - w tej godzinie domykacz nie dziala.
  # - Dziala tylko w godzinach sesji planera: 06-12 i 15-21.
  ###############################################################################

  - id: magazyn_snapshot_licznikow_hh00
    alias: "Magazyn: snapshot licznikow na start godziny"
    mode: single
    description: >
      O kazdej pelnej godzinie zapisuje biezacy stan licznikow importu i eksportu
      z Solarman do dwoch var. Sluzy jako baza do obliczania delty godzinowej
      w domykaczu godziny (zadanie 2/2).
    trigger:
      - platform: time_pattern
        minutes: 0
        seconds: 15
    action:
      - service: var.set
        data:
          entity_id: var.magazyn_import_snapshot_hh00
          value: "{{ states('sensor.solarman_total_energy_bought_safe') | float(0) }}"
      - service: var.set
        data:
          entity_id: var.magazyn_eksport_snapshot_hh00
          value: "{{ states('sensor.solarman_total_energy_sold_safe') | float(0) }}"
      # Reset celu domykacza — nowa godzina, stary target nieaktualny
      - service: var.set
        data:
          entity_id: var.magazyn_domykacz_exp_target
          value: "0"

  - id: magazyn_domykacz_godziny_hh45_v1_0
    alias: "Magazyn: Domykacz godziny (HH:45) v1.0"
    mode: single
    description: >
      Zadanie 2/2: o HH:45:30 sprawdza realne salda importu/eksportu w biezacej
      godzinie i jesli import > eksport - wlacza rozladowanie baterii do sieci,
      aby zbilansowac godzine przed HH+1:00. Nie narusza budzetu SOC potrzebnego
      do dociagniecia do 13:00 (rano) ani do 22:00 (wieczorem). Jeden strzal na
      godzine, niezalezny od planera - planer uruchomi sie normalnie o HH+1:00
      i podejmie decyzje od nowa.
    trigger:
      - platform: time_pattern
        minutes: "45"
        seconds: "30"
    condition:
      - condition: template
        value_template: >
          {{ now().hour in [6,7,8,9,10,11,12, 15,16,17,18,19,20,21] }}
    action:
      - variables:
          h_now: "{{ now().hour }}"
          imp_now: "{{ states('sensor.solarman_total_energy_bought_safe') | float(0) }}"
          exp_now: "{{ states('sensor.solarman_total_energy_sold_safe') | float(0) }}"
          imp_snap: "{{ states('var.magazyn_import_snapshot_hh00') | float(0) }}"
          exp_snap: "{{ states('var.magazyn_eksport_snapshot_hh00') | float(0) }}"
          snap_is_fresh: >
            {{ states.var.magazyn_import_snapshot_hh00 is not none
               and (states.var.magazyn_import_snapshot_hh00.last_changed
                    >= now().replace(minute=0, second=0, microsecond=0)) }}
          soc_now: "{{ states('sensor.solarman_battery_safe') | float(0) }}"
          pojemnosc_kwh: "{{ states('var.magazyn_pojemnosc_brutto_kwh') | float(15) }}"
          max_moc_kw: "{{ states('var.magazyn_max_moc_rozladowania_kw') | float(6) }}"
          soc_floor_pct_eff: >
            {% if (now().hour) < 13 %}
              {{ states('var.magazyn_soc_min_rano_percent') | float(25) }}
            {% else %}
              {{ states('var.magazyn_soc_floor_percent') | float(20) }}
            {% endif %}

      - variables:
          imp_h: "{{ [imp_now - imp_snap, 0] | max }}"
          exp_h: "{{ [exp_now - exp_snap, 0] | max }}"
          deficit_raw: "{{ [(imp_now - imp_snap) - (exp_now - exp_snap), 0] | max }}"
          slot_cap_kwh: "{{ (max_moc_kw | float(6)) * 0.25 }}"
          e_available_kwh: >
            {{ [((soc_now - (soc_floor_pct_eff | float(25))) / 100.0)
                * (pojemnosc_kwh | float(15)), 0] | max }}

      - variables:
          deficit_allowed: "{{ [deficit_raw, slot_cap_kwh, e_available_kwh] | min }}"
          skip_reason: >-
            {% if not snap_is_fresh %}snapshot_stale
            {%- elif deficit_raw <= 0.05 %}no_deficit
            {%- elif e_available_kwh <= 0.05 %}soc_floor
            {%- else %}OK{%- endif %}
          was_discharging: "{{ is_state('input_boolean.battery_discharge_to_grid', 'on') }}"

      - service: script.ems_notify
        data:
          title: "Domykacz {{ h_now }}:45 | {{ skip_reason }}"
          message: >-
            imp_h={{ imp_h | round(3) }} kWh
            | exp_h={{ exp_h | round(3) }} kWh
            | deficit_raw={{ deficit_raw | round(3) }} kWh
            | slot_cap={{ slot_cap_kwh | round(3) }} kWh
            | e_avail={{ e_available_kwh | round(3) }} kWh
            | deficit_allowed={{ deficit_allowed | round(3) }} kWh
            | SOC={{ soc_now }}% (floor {{ soc_floor_pct_eff }}%)
            | snap_fresh={{ snap_is_fresh }}
            | imp_snap={{ imp_snap | round(3) }} kWh
            | exp_snap={{ exp_snap | round(3) }} kWh
            | was_discharging={{ was_discharging }}

      - condition: template
        value_template: "{{ snap_is_fresh and deficit_allowed > 0.05 }}"

      - service: input_boolean.turn_on
        target:
          entity_id: input_boolean.battery_discharge_to_grid

      # Twardy stop: zapisz bezwzględny cel eksportu do var.
      # STOPPER_DOMYKACZ monitoruje sensor.solarman_total_energy_sold_safe
      # i wyłącza discharge gdy target zostanie osiągnięty.
      # Jeśli planer już wcześniej włączył discharge (was_discharging=true),
      # nie ustawiamy targetu — planer sam zarządza dalej.
      - condition: template
        value_template: "{{ not was_discharging }}"

      - service: var.set
        data:
          entity_id: var.magazyn_domykacz_exp_target
          value: "{{ (exp_snap + deficit_allowed) | round(3) }}"

  ###############################################################################
  # STOPPER DOMYKACZA: wyłącz discharge gdy total_energy_sold_safe >= target
  ###############################################################################
  - id: magazyn_stopper_domykacz_exp_target
    alias: "Magazyn: STOP domykacz – eksport >= cel"
    mode: single
    trigger:
      - platform: state
        entity_id: sensor.solarman_total_energy_sold_safe
    action:
      - variables:
          exp_now: "{{ states('sensor.solarman_total_energy_sold_safe') | float(0) }}"
          target: "{{ states('var.magazyn_domykacz_exp_target') | float(0) }}"
          discharging: "{{ is_state('input_boolean.battery_discharge_to_grid', 'on') }}"
      - condition: template
        value_template: "{{ target > 0 and discharging and exp_now >= target }}"
      - service: input_boolean.turn_off
        target:
          entity_id: input_boolean.battery_discharge_to_grid
      - service: var.set
        data:
          entity_id: var.magazyn_domykacz_exp_target
          value: "0"
      - service: script.ems_notify
        data:
          title: "Domykacz STOP: cel osiągnięty"
          message: >-
            exp_now={{ exp_now | round(3) }} kWh >= target={{ target | round(3) }} kWh
            → battery_discharge_to_grid OFF
