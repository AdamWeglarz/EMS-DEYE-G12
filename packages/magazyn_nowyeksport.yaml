  - alias: "Magazyn: Eksport wieczorny (15-22) plan+exec v5.2"
    id: magazyn_export_wieczor_plan_exec_v5_2_full_first_fix_pv_fix_partial
    mode: single
    description: >
      Wieczorny eksport 15:00–22:00:
      - FULL: cena >= prog_pelny -> oddaj maksymalnie do floor technicznego
