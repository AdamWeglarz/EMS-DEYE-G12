###############################################################################
# MAGAZYN – VARS (snarky-snark/home-assistant-variables)
# Definicje stałych polityki / parametrów (AS-IS) + IKONY
###############################################################################

input_boolean:
  # Sterowanie trybami inwertera
  battery_discharge_to_grid:
    name: Oddaj energię z magazynu do sieci
    icon: mdi:transmission-tower-export

  pv_discharge_to_grid:
    name: Oddaj energię z PV do sieci
    icon: mdi:transmission-tower-export

  battery_charge_from_grid:
    name: Ładuj akumulator z sieci
    icon: mdi:transmission-tower-import

  magazyn_doladowanie_pod_eksport_wieczor:
    name: Magazyn - doładowanie pod eksport wieczorny
    icon: mdi:battery-arrow-up-outline

  magazyn_doladowanie_pod_eksport_poranek:
    name: Magazyn - doładowanie pod eksport poranny
    icon: mdi:battery-arrow-up-outline


input_number:
  manual_battery_charge_limit:
    name: "Manualny Limit Ładowania Baterii"
    min: 20
    max: 100
    step: 1
    unit_of_measurement: "%"
    mode: slider
    icon: mdi:battery-arrow-up

var:

  spill_poranny:
    initial_value: 0
    restore: true
    unit_of_measurement: "kWh"
    friendly_name: "Spill poranny"
    icon: "mdi:battery-arrow-up"
    unique_id: "spill_poranny"

  # 1) Bateria i SOC (model + sterowanie)
