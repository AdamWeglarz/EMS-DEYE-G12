    unique_id: "magazyn_pojemnosc_brutto_kwh"
    friendly_name: "Magazyn: Pojemność brutto"
    icon: "mdi:battery"
    initial_value: 15.0
    restore: true

  magazyn_soc_floor_percent:
    unique_id: "magazyn_soc_floor_percent"
    friendly_name: "Magazyn: SOC floor (techniczny + default limit)"
    icon: "mdi:battery-low"
    initial_value: 20
    restore: true

  magazyn_soc_comfort_percent:
    unique_id: "magazyn_soc_comfort_percent"
    friendly_name: "Magazyn: SOC komfortowy (okna)"
