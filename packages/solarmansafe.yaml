              {% endif %}
            {% endif %}
          {% endif %}

        availability: true
sensor:
  - platform: statistics
    name: Średnia moc z PV 5 minut
    unique_id: srednia_moc_PV_5_minut
    entity_id: sensor.solaredge_ac_power
    max_age:
      minutes: 5
    state_characteristic: average_linear
    sampling_size: 150

  - platform: statistics
    name: Średnia moc pobierana przez dom 2 5 minut
    unique_id: srednia_moc_pobierana_przez_dom_2_5_minut
    entity_id: sensor.moc_pobierana_przez_dom_2
    max_age:
      minutes: 5
    state_characteristic: average_linear
    sampling_size: 150

  - platform: min_max
    name: Dzienna maksymalna moc SolarEdge
    unique_id: solaredge_peak_power_daily
    type: max
    entity_ids:
      - sensor.solaredge_ac_power
