template:
  - trigger:
      - platform: state
        entity_id: sensor.solarman_total_energy_bought
    sensor:
      - name: "Solarman Total Energy Bought Safe"
        unique_id: solarman_total_energy_bought_safe
        unit_of_measurement: "kWh"
        device_class: energy
        state_class: total_increasing
        state: >
          {% set raw_s = states('sensor.solarman_total_energy_bought') %}
          {% set prev_s = this.state %}

          {% if raw_s in ['unknown', 'unavailable', 'none', ''] %}
            {{ prev_s if prev_s not in ['unknown', 'unavailable', 'none', ''] else 0 }}
          {% else %}
            {% set raw = raw_s | float(0) %}
            {% if prev_s in ['unknown', 'unavailable', 'none', ''] %}
              {{ raw | round(3) }}
            {% else %}
              {% set prev = prev_s | float(0) %}
              {{ [raw, prev] | max | round(3) }}
            {% endif %}
          {% endif %}
        availability: true

