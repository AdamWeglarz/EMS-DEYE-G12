script:
  pralnia_mignij:
    alias: "Pralnia: Mignij 2s (przywróć stan)"
    mode: single
    sequence:
      - variables:
          bylo_wlaczone: "{{ is_state('light.pralnia', 'on') }}"
      - if:
          - condition: template
            value_template: "{{ bylo_wlaczone }}"
        then:
          - service: light.turn_off
            target:
              entity_id: light.pralnia
          - delay: "00:00:02"
          - service: light.turn_on
            target:
              entity_id: light.pralnia
        else:
          - service: light.turn_on
            target:
              entity_id: light.pralnia
          - delay: "00:00:02"
          - service: light.turn_off
            target:
              entity_id: light.pralnia

input_datetime:
  suszarka_planned_start:
    name: Suszarka — zaplanowany start
    has_date: true
    has_time: true
  pralka_planned_start:
    name: Pralka — zaplanowany start
    has_date: true
    has_time: true
